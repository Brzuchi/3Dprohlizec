<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Prohlížeč - TSZ Autoworks</title>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <style>
        body {
            margin: 0;
            background-color: #000000; /* Černé pozadí celé obrazovky */
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; /* Čistší font */
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden; /* Zabránit scrollování celé stránky */
        }

        #viewer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1; /* Umístí 3D scénu do pozadí */
            overflow: hidden;
        }

        #ui-container {
            position: relative;
            z-index: 10;
            background-color: #0F0F0F; /* Velmi tmavě šedá pro kontejner (podle obrazek_7.png) */
            padding: 40px;
            border-radius: 20px; /* Zaoblené rohy */
            border: 2px solid #333333; /* Šedý border (podle obrazek_7.png) */
            width: 400px; /* Kompaktní šířka */
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7); /* Jemný stín pro hloubku */
            text-align: center; /* Centrovat vše uvnitř */
        }

        h2 {
            font-size: 2.8em;
            font-weight: bold;
            margin: 0 0 25px 0;
            color: #FFFFFF;
        }

        .file-input-wrapper {
            margin-bottom: 25px;
            color: #CCCCCC;
            font-size: 1.1em;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Styl pro standardní browserový input souboru */
        input[type="file"] {
            display: block;
            margin: 0 auto;
            color: #CCCCCC;
        }

        .btn {
            width: 100%;
            background: #007BFF; /* Ta jasná modrá z image 7 */
            border: none;
            color: white;
            padding: 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.2em;
            margin-top: 15px;
            transition: background 0.3s;
        }

        .btn:hover {
            background: #0056B3;
        }

        #status {
            margin-top: 20px;
            font-size: 1.1em;
            color: #AAAAAA;
        }

        #link-container {
            margin-top: 25px;
            display: none;
            padding: 15px;
            background: #1A1A1A;
            border-radius: 8px;
            border: 1px solid #333333;
        }
        strong#share-link {
            color: #0080FF;
            word-wrap: break-word; /* Pro dlouhé odkazy */
        }
    </style>
</head>
<body>

<div id="ui-container">
    <h2>3D Prohlížeč</h2>
    <div class="file-input-wrapper">
        <input type="file" id="file-input" accept=".stl,.obj">
    </div>
    <button id="upload-btn" class="btn">Nahrát a sdílet</button>
    <div id="status">Připraven k nahrávání...</div>
    <div id="link-container">
        Kód pro sdílení:<br>
        <strong id="share-link"></strong>
    </div>
</div>

<div id="viewer"></div>

<script type="module">
    import * as THREE from 'three';
    import { STLLoader } from 'three/addons/loaders/STLLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

    // --- KONFIGURACE FIREBASE ---
    // Zachováváme tvoje opravené ID bez trojky
    const firebaseConfig = {
        apiKey: "AIzaSyDguKneObW3GP-C1b2fuVKovcFj3G4U-_I",
        authDomain: "dprohlizec.firebaseapp.com",
        projectId: "dprohlizec",
        storageBucket: "dprohlizec.firebasestorage.app",
        messagingSenderId: "722754282413",
        appId: "1:722754282413:web:36573c5095e261f2378f8b"
    };

    const app = initializeApp(firebaseConfig);
    const storage = getStorage(app);

    // --- 3D SCÉNA (Three.js) ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a1a); // Tmavě šedá pro 3D scénu
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.getElementById('viewer').appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    const light = new THREE.DirectionalLight(0xffffff, 1);
    light.position.set(1, 1, 1).normalize();
    scene.add(light);
    scene.add(new THREE.AmbientLight(0x404040));
    camera.position.z = 5;

    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }
    animate();

    // --- LOGIKA NAHRÁVÁNÍ ---
    const fileInput = document.getElementById('file-input');
    const uploadBtn = document.getElementById('upload-btn');
    const statusDiv = document.getElementById('status');
    const linkContainer = document.getElementById('link-container');
    const shareLink = document.getElementById('share-link');

    uploadBtn.addEventListener('click', async () => {
        const file = fileInput.files[0];
        if (!file) {
            alert("Vyber nejdříve soubor!");
            return;
        }

        console.log("Start nahrávání:", file.name);
        statusDiv.innerText = "Nahrávám soubor na Firebase...";
        uploadBtn.disabled = true;

        try {
            const storageRef = ref(storage, 'models/' + Date.now() + '-' + file.name);
            const snapshot = await uploadBytes(storageRef, file);
            console.log("Soubor nahrán!");

            const downloadURL = await getDownloadURL(snapshot.ref);
            console.log("Odkaz získán:", downloadURL);

            statusDiv.innerText = "Hotovo! Soubor je uložen.";
            linkContainer.style.display = "block";
            shareLink.innerText = downloadURL;
            
            // Náhled modelu directly in the browser
            loadModel(downloadURL);

        } catch (error) {
            console.error("Chyba při nahrávání:", error);
            statusDiv.innerText = "Chyba: " + error.message;
        } finally {
            uploadBtn.disabled = false;
        }
    });

    function loadModel(url) {
        // Nejprve vyčistíme starý model ze scény
        scene.traverse((object) => {
            if (object.isMesh) {
                scene.remove(object);
            }
        });

        const loader = new STLLoader();
        loader.load(url, (geometry) => {
            const material = new THREE.MeshPhongMaterial({ color: 0x007bff, specular: 0x111111, shininess: 200 });
            const mesh = new THREE.Mesh(geometry, material);
            
            // Vycentrování modelu
            geometry.computeBoundingBox();
            const center = new THREE.Vector3();
            geometry.boundingBox.getCenter(center);
            mesh.position.sub(center);
            
            scene.add(mesh);
            statusDiv.innerText = "Model zobrazen v náhledu.";
        });
    }

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>

</body>
</html>
