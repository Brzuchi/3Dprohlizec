<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prohlížeč modelů💾</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1a1a1a; color: white; }
        
        #ui-container { position: absolute; top: 20px; left: 20px; background: rgba(30, 30, 30, 0.9); border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); min-width: 280px; max-width: 350px; z-index: 10; border: 1px solid #444; }
        
        .header-bar { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: rgba(10, 10, 10, 0.6); border-radius: 10px 10px 0 0; cursor: pointer; user-select: none; }
        .header-bar h2 { margin: 0; font-size: 1.2em; pointer-events: none; }
        .header-bar:hover { background: rgba(0, 0, 0, 0.8); }

        #ui-content { padding: 0 20px 20px 20px; max-height: 75vh; overflow-y: auto; display: block; }
        #ui-content.collapsed { display: none; } 

        .upload-section { margin-top: 15px; margin-bottom: 20px; border-bottom: 1px solid #555; padding-bottom: 20px; }
        
        .upload-btn { background: #007bff; color: white; padding: 10px; border-radius: 5px; cursor: pointer; text-align: center; display: block; font-weight: 600; transition: background 0.2s;}
        .upload-btn:hover { background: #0056b3; }
        input[type="file"] { display: none; }
        
        .reset-btn { background: #dc3545; color: white; padding: 8px; border-radius: 5px; cursor: pointer; text-align: center; display: block; font-weight: 600; width: 100%; border: none; margin-top: 10px; transition: background 0.2s;}
        .reset-btn:hover { background: #c82333; }

        #link-container { display: none; margin-top: 15px; padding: 10px; background: rgba(0, 123, 255, 0.1); border-left: 4px solid #007bff; }
        .generated-link { display: block; margin-top: 5px; color: #00a2ff; word-break: break-all; font-size: 0.85em; text-decoration: none; }
        .generated-link:hover { text-decoration: underline; }

        .model-item { margin-top: 12px; display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.05); padding: 8px 12px; border-radius: 5px; }
        .model-item-left { display: flex; align-items: center; }
        .model-item input[type="checkbox"] { margin-right: 12px; cursor: pointer; width: 18px; height: 18px; }
        .model-item label { cursor: pointer; word-break: break-all; font-weight: 500; font-size: 0.9em;}

        #viewer { width: 100vw; height: 100vh; display: block; }
        #loader-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 100; flex-direction: column; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <div id="loader-overlay">
        <div style="border: 4px solid #f3f3f3; border-top: 4px solid #007bff; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite;"></div>
        <p id="loader-text" style="margin-top: 15px;">Pracuji na tom...</p>
    </div>

    <div id="ui-container">
        <div id="toggle-menu-btn" class="header-bar">
            <h2>⚙️ Správce modelů</h2>
            <span id="toggle-icon" style="transition: transform 0.2s; font-size: 1.2em;">▼</span>
        </div>
        
        <div id="ui-content">
            <div id="upload-box" class="upload-section">
                <label class="upload-btn">
                    Nahrát STL / OBJ / ZIP
                    <input type="file" id="file-input" multiple accept=".stl, .obj, .zip">
                </label>
                
                <button id="reset-btn" class="reset-btn" style="display: none;">Vytvořit novou sestavu</button>

                <div id="link-container">
                    <strong>Odkaz pro sdílení!</strong>
                    <span style="font-size: 0.8em; color: #aaa;"><br>Tento odkaz uvidí kdokoliv.</span>
                    <a id="share-link" class="generated-link" href="#" target="_blank"></a>
                </div>
            </div>

            <div id="model-list">
                <em id="empty-msg" style="color: #aaa; font-size: 0.9em;">Zatím nebyly nahrány žádné modely.</em>
            </div>
        </div>
    </div>

    <div id="viewer"></div>

    <script type="module">
        import * as THREE from 'three';
        import { STLLoader } from 'three/addons/loaders/STLLoader.js';
        import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

        // --- KONFIGURACE SUPABASE ---
        const SUPABASE_URL = 'https://aukjrwkjvuhmbfqqgoav.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_YvrqIr_5PQY-wftqvZDcYA_Mu_HuKT3';
        const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

        // --- UI PRVKY ---
        const toggleMenuBtn = document.getElementById('toggle-menu-btn');
        const uiContent = document.getElementById('ui-content');
        const toggleIcon = document.getElementById('toggle-icon');
        const fileInput = document.getElementById('file-input');
        const uploadBox = document.getElementById('upload-box'); 
        const linkContainer = document.getElementById('link-container');
        const shareLink = document.getElementById('share-link');
        const emptyMsg = document.getElementById('empty-msg');
        const resetBtn = document.getElementById('reset-btn');
        const loaderOverlay = document.getElementById('loader-overlay');
        const loaderText = document.getElementById('loader-text');

        // --- ROLETKA ---
        toggleMenuBtn.addEventListener('click', () => {
            uiContent.classList.toggle('collapsed');
            toggleIcon.style.transform = uiContent.classList.contains('collapsed') ? 'rotate(-90deg)' : 'rotate(0deg)';
        });

        // --- THREE.JS SCÉNA ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a1a);
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 10000);
        camera.position.set(100, 100, 100);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('viewer').appendChild(renderer.domElement);
        
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
        dirLight.position.set(1, 1, 1).normalize();
        scene.add(dirLight);

        const modelsGroup = new THREE.Group();
        modelsGroup.rotation.x = -Math.PI / 2; // CAD Z-up na Web Y-up
        scene.add(modelsGroup);

        const showLoader = (text) => { loaderText.innerText = text; loaderOverlay.style.display = 'flex'; };
        const hideLoader = () => { loaderOverlay.style.display = 'none'; };

        function focusCamera() {
            if (modelsGroup.children.length === 0) return;
            const box = new THREE.Box3().setFromObject(modelsGroup);
            const center = box.getCenter(new THREE.Vector3());
            const size = box.getSize(new THREE.Vector3());
            const maxDim = Math.max(size.x, size.y, size.z);
            camera.position.set(center.x, center.y + maxDim / 2, center.z + (maxDim * 1.5));
            controls.target.copy(center);
            controls.update();
        }

        async function loadAndRender(url, name, color) {
            const isObj = name.toLowerCase().endsWith('.obj');
            const loader = isObj ? new OBJLoader() : new STLLoader();
            const material = new THREE.MeshStandardMaterial({ color: color || 0x007bff, roughness: 0.4, metalness: 0.1, side: THREE.DoubleSide });

            return new Promise((resolve) => {
                loader.load(url, (result) => {
                    let mesh;
                    if (isObj) {
                        result.traverse(child => { if (child.isMesh) child.material = material; });
                        mesh = result;
                    } else {
                        mesh = new THREE.Mesh(result, material);
                    }
                    modelsGroup.add(mesh);
                    createUIItem(name, mesh, color);
                    resolve();
                }, undefined, (err) => {
                    console.error("Chyba při renderu modelu:", err);
                    resolve();
                });
            });
        }

        function createUIItem(name, mesh, color) {
            if (emptyMsg) emptyMsg.style.display = 'none';
            const div = document.createElement('div');
            div.className = 'model-item';
            const hexColor = '#' + (mesh.children?.[0]?.material?.color?.getHexString() || mesh.material?.color?.getHexString() || "007bff");
            
            div.innerHTML = `
                <div class="model-item-left">
                    <input type="checkbox" checked id="chk-${name}">
                    <label for="chk-${name}" style="color: ${hexColor}">${name}</label>
                </div>
            `;
            div.querySelector('input').addEventListener('change', (e) => mesh.visible = e.target.checked);
            document.getElementById('model-list').appendChild(div);
        }

        // --- ZPRACOVÁNÍ URL (Návštěvník) ---
        const urlId = new URLSearchParams(window.location.search).get('id');
        if (urlId) {
            showLoader("Načítám modely ze Supabase...");
            
            async function fetchSharedModels() {
                const { data, error } = await supabase.storage.from('models').list(`shared/${urlId}`);
                
                if (error || !data || data.length === 0) {
                    emptyMsg.innerText = "Sestava nebyla nalezena nebo je prázdná.";
                    hideLoader();
                    return;
                }

                for (const file of data) {
                    if(file.name === '.emptyFolderPlaceholder') continue;
                    const { data: publicUrlData } = supabase.storage.from('models').getPublicUrl(`shared/${urlId}/${file.name}`);
                    await loadAndRender(publicUrlData.publicUrl, file.name);
                }
                focusCamera();
                uploadBox.style.display = 'none';
                resetBtn.style.display = 'block';
                hideLoader();
            }
            fetchSharedModels();
        }

        // --- NAHRÁVÁNÍ (Vojtěch) ---
        fileInput.addEventListener('change', async (e) => {
            const files = e.target.files;
            if (!files.length) return;

            const sessionId = Math.random().toString(36).substring(2, 10);
            showLoader("Nahrávám do Supabase...");

            try {
                for (const file of files) {
                    if (file.name.toLowerCase().endsWith('.zip')) {
                        const zip = await JSZip.loadAsync(file);
                        for (const [path, entry] of Object.entries(zip.files)) {
                            if (!entry.dir && (path.endsWith('.stl') || path.endsWith('.obj'))) {
                                const blob = await entry.async("blob");
                                const fileName = path.split('/').pop();
                                const { error } = await supabase.storage.from('models').upload(`shared/${sessionId}/${fileName}`, blob);
                                if(error) throw error;
                            }
                        }
                    } else {
                        const { error } = await supabase.storage.from('models').upload(`shared/${sessionId}/${file.name}`, file);
                        if(error) throw error;
                    }
                }
                const shareUrl = `${window.location.origin}${window.location.pathname}?id=${sessionId}`;
                window.location.href = shareUrl;
            } catch (error) {
                console.error("Chyba:", error);
                alert("Nahrávání selhalo (možná chybí bucket 'models'): " + error.message);
                hideLoader();
            }
        });

        resetBtn.addEventListener('click', () => window.location.href = window.location.pathname);
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
