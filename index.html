<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Prohlížeč - TSZ Autoworks</title>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <style>
        body { margin: 0; background-color: #1a1a1a; color: white; font-family: sans-serif; overflow: hidden; }
        #ui-container { position: absolute; top: 20px; left: 20px; z-index: 10; background: rgba(0, 0, 0, 0.7); padding: 20px; border-radius: 10px; border: 1px solid #444; }
        #viewer { width: 100vw; height: 100vh; }
        .btn { background: #007bff; border: none; color: white; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-top: 10px; }
        .btn:hover { background: #0056b3; }
        #status { margin-top: 10px; font-size: 0.9em; color: #aaa; }
        #link-container { margin-top: 15px; display: none; padding: 10px; background: #2d5a27; border-radius: 5px; }
        input[type="file"] { display: block; margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="ui-container">
    <h2>3D Prohlížeč</h2>
    <input type="file" id="file-input" accept=".stl,.obj">
    <button id="upload-btn" class="btn">Nahrát a sdílet</button>
    <div id="status">Připraven k nahrávání...</div>
    <div id="link-container">
        Kód pro sdílení:<br>
        <strong id="share-link"></strong>
    </div>
</div>

<div id="viewer"></div>

<script type="module">
    import * as THREE from 'three';
    import { STLLoader } from 'three/addons/loaders/STLLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

    // --- KONFIGURACE FIREBASE ---
    // Používáme tvoje ID "dprohlizec" bez trojky
    const firebaseConfig = {
        apiKey: "AIzaSyDguKneObW3GP-C1b2fuVKovcFj3G4U-_I",
        authDomain: "dprohlizec.firebaseapp.com",
        projectId: "dprohlizec",
        storageBucket: "dprohlizec.firebasestorage.app",
        messagingSenderId: "722754282413",
        appId: "1:722754282413:web:36573c5095e261f2378f8b"
    };

    const app = initializeApp(firebaseConfig);
    const storage = getStorage(app);

    // --- 3D SCÉNA (Three.js) ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a1a);
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.getElementById('viewer').appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    const light = new THREE.DirectionalLight(0xffffff, 1);
    light.position.set(1, 1, 1).normalize();
    scene.add(light);
    scene.add(new THREE.AmbientLight(0x404040));
    camera.position.z = 5;

    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }
    animate();

    // --- LOGIKA NAHRÁVÁNÍ ---
    const fileInput = document.getElementById('file-input');
    const uploadBtn = document.getElementById('upload-btn');
    const statusDiv = document.getElementById('status');
    const linkContainer = document.getElementById('link-container');
    const shareLink = document.getElementById('share-link');

    uploadBtn.addEventListener('click', async () => {
        const file = fileInput.files[0];
        if (!file) {
            alert("Vyber nejdříve soubor!");
            return;
        }

        console.log("Start nahrávání:", file.name);
        statusDiv.innerText = "Nahrávám soubor na Firebase...";
        uploadBtn.disabled = true;

        try {
            // Vytvoření cesty v úložišti
            const storageRef = ref(storage, 'models/' + Date.now() + '-' + file.name);
            
            // Nahrání souboru
            const snapshot = await uploadBytes(storageRef, file);
            console.log("Soubor nahrán!");

            // Získání odkazu
            const downloadURL = await getDownloadURL(snapshot.ref);
            console.log("Odkaz získán:", downloadURL);

            // Zobrazení výsledku
            statusDiv.innerText = "Hotovo! Soubor je uložen.";
            linkContainer.style.display = "block";
            shareLink.innerText = downloadURL;
            
            // Náhled modelu přímo v prohlížeči
            loadModel(downloadURL);

        } catch (error) {
            console.error("Chyba při nahrávání:", error);
            statusDiv.innerText = "Chyba: " + error.message;
        } finally {
            uploadBtn.disabled = false;
        }
    });

    function loadModel(url) {
        const loader = new STLLoader();
        loader.load(url, (geometry) => {
            const material = new THREE.MeshPhongMaterial({ color: 0x007bff, specular: 0x111111, shininess: 200 });
            const mesh = new THREE.Mesh(geometry, material);
            
            // Vycentrování modelu
            geometry.computeBoundingBox();
            const center = new THREE.Vector3();
            geometry.boundingBox.getCenter(center);
            mesh.position.sub(center);
            
            scene.add(mesh);
            statusDiv.innerText = "Model zobrazen v náhledu.";
        });
    }

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>

</body>
</html>
