<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D prohlížeč 💾</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1a1a1a; color: white; }
        #ui-container { position: absolute; top: 20px; left: 20px; background: rgba(30, 30, 30, 0.9); border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); min-width: 280px; max-width: 350px; z-index: 10; border: 1px solid #444; }
        .header-bar { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: rgba(10, 10, 10, 0.6); border-radius: 10px 10px 0 0; cursor: pointer; user-select: none; border-bottom: 1px solid #444; }
        .header-bar h2 { margin: 0; font-size: 1.1em; pointer-events: none; }
        .ui-section-content { padding: 0 20px 20px 20px; max-height: 40vh; overflow-y: auto; display: block; }
        .ui-section-content.collapsed { display: none; } 
        .upload-section { margin-top: 15px; margin-bottom: 10px; border-bottom: 1px solid #555; padding-bottom: 15px; }
        .upload-btn { background: #007bff; color: white; padding: 10px; border-radius: 5px; cursor: pointer; text-align: center; display: block; font-weight: 600; transition: background 0.2s;}
        input[type="file"] { display: none; }
        .btn-group { display: flex; gap: 8px; margin-top: 10px; }
        .reset-btn, .delete-all-btn { padding: 8px; border-radius: 5px; cursor: pointer; text-align: center; flex: 1; font-weight: 600; border: none; font-size: 0.85em; }
        .reset-btn { background: #6c757d; color: white; }
        .delete-all-btn { background: #dc3545; color: white; }
        #link-container { display: none; margin-top: 10px; padding: 10px; background: rgba(0, 123, 255, 0.1); border: 1px solid #007bff; border-radius: 5px; }
        .link-row { display: flex; gap: 8px; margin-top: 5px; align-items: center; }
        .generated-link { flex: 1; color: #00a2ff; word-break: break-all; font-size: 0.8em; text-decoration: none; font-family: monospace; background: rgba(0,0,0,0.3); padding: 5px; border-radius: 3px; overflow: hidden; text-overflow: ellipsis; }
        .copy-btn { background: #007bff; color: white; border: none; padding: 5px 10px; border-radius: 3px; cursor: pointer; font-size: 0.75em; }
        .model-item { margin-top: 10px; display: flex; flex-direction: column; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 5px; border-left: 4px solid transparent; }
        .model-item-top { display: flex; justify-content: space-between; align-items: center; }
        .model-item-left { display: flex; align-items: center; overflow: hidden; }
        .model-item input[type="checkbox"] { margin-right: 10px; cursor: pointer; }
        .model-item label { cursor: pointer; font-weight: 600; font-size: 0.85em; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .opacity-slider { width: 100%; margin-top: 8px; height: 3px; accent-color: #007bff; }
        .slider-label { font-size: 0.65em; color: #888; margin-top: 3px; text-transform: uppercase; }
        .comment-add-btn { background: #28a745; color: white; padding: 8px; border-radius: 5px; cursor: pointer; text-align: center; display: block; font-weight: 600; margin-top: 15px; border: none; width: 100%; transition: 0.2s; }
        .comment-add-btn.active { background: #ffc107; color: black; }
        .comment-item { margin-top: 8px; display: flex; align-items: center; background: rgba(255,255,255,0.07); padding: 8px; border-radius: 5px; border-left: 4px solid; cursor: pointer; }
        .comment-item:hover { background: rgba(255,255,255,0.15); }
        .comment-text { flex: 1; font-size: 0.85em; margin-left: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .comment-del { color: #dc3545; font-weight: bold; margin-left: 8px; padding: 0 5px; }
        #viewcube-container { position: absolute; top: 20px; right: 20px; width: 130px; height: 130px; z-index: 20; }
        #viewer { width: 100vw; height: 100vh; display: block; }
        #loader-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 100; flex-direction: column; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script type="importmap"> { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } } </script>
</head>
<body>
    <div id="loader-overlay">
        <div style="border: 4px solid #f3f3f3; border-top: 4px solid #007bff; border-radius: 50%; width: 35px; height: 35px; animation: spin 1s linear infinite;"></div>
    </div>

    <div id="ui-container">
        <div class="header-bar" onclick="toggleSection('ui-models', 'icon-models')">
            <h2>⚙️ Modely a vrstvy</h2>
            <span id="icon-models">▼</span>
        </div>
        <div id="ui-models" class="ui-section-content">
            <div id="upload-box" class="upload-section">
                <label class="upload-btn">Nahrát data
                    <input type="file" id="file-input" multiple accept=".stl, .obj, .zip">
                </label>
                <div id="link-container">
                    <div class="link-row">
                        <a id="share-link" class="generated-link" href="#" target="_blank"></a>
                        <button id="copy-link-btn" class="copy-btn">Kopírovat</button>
                    </div>
                </div>
                <div class="btn-group">
                    <button id="reset-btn" class="reset-btn" style="display: none;">Nová práce</button>
                    <button id="delete-all-btn" class="delete-all-btn" style="display: none;">Smazat</button>
                </div>
            </div>
            <div id="model-list"></div>
        </div>

        <div class="header-bar" onclick="toggleSection('ui-comments', 'icon-comments')">
            <h2>💬 Komentáře</h2>
            <span id="icon-comments">▼</span>
        </div>
        <div id="ui-comments" class="ui-section-content">
            <button id="add-comment-toggle" class="comment-add-btn">➕ Přidat komentář</button>
            <div id="comment-list"></div>
        </div>
    </div>

    <div id="viewcube-container"></div>
    <div id="viewer"></div>

    <script type="module">
        import * as THREE from 'three';
        import { STLLoader } from 'three/addons/loaders/STLLoader.js';
        import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

        const supabase = createClient('https://aukjrwkjvuhmbfqqgoav.supabase.co', 'sb_publishable_YvrqIr_5PQY-wftqvZDcYA_Mu_HuKT3');
        const cubeSize = 130;
        let currentSessionId = new URLSearchParams(window.location.search).get('id');
        let isAddingComment = false;
        let annotationMeshes = [];
        let markerRadius = 5;
        const commentColors = [0xff0000, 0x00ff00, 0x0000ff, 0xffff00, 0xff00ff, 0x00ffff, 0xffa500, 0xffffff];

        const scene = new THREE.Scene(); scene.background = new THREE.Color(0x1a1a1a);
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 10000); camera.position.set(200, 200, 200);
        const renderer = new THREE.WebGLRenderer({ antialias: true }); renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('viewer').appendChild(renderer.domElement);
        const controls = new OrbitControls(camera, renderer.domElement); controls.enableDamping = true;
        scene.add(new THREE.AmbientLight(0xffffff, 0.7));
        const dl = new THREE.DirectionalLight(0xffffff, 1.2); dl.position.set(100, 100, 100); scene.add(dl);
        const modelsGroup = new THREE.Group(); modelsGroup.rotation.x = -Math.PI/2; scene.add(modelsGroup);

        window.toggleSection = (id, iconId) => {
            const el = document.getElementById(id);
            const icon = document.getElementById(iconId);
            if (el && icon) {
                el.classList.toggle('collapsed');
                icon.style.transform = el.classList.contains('collapsed') ? 'rotate(-90deg)' : 'rotate(0deg)';
            }
        };

        async function fetchModels(targetId) {
            const id = targetId || currentSessionId; if (!id) return;
            if (!targetId) document.getElementById('upload-box').style.display = 'none';
            else { document.getElementById('reset-btn').style.display = 'block'; document.getElementById('delete-all-btn').style.display = 'block'; }
            
            document.getElementById('loader-overlay').style.display = 'flex';
            const { data } = await supabase.storage.from('models').list(`shared/${id}`);
            const cols = [0x007bff, 0xdc3545, 0x28a745, 0xffc107, 0x17a2b8, 0x6f42c1, 0xfd7e14, 0xe83e8c, 0x20c997, 0x6610f2, 0xadb5bd, 0x94d82d, 0xff922b, 0x51cf66, 0x339af0, 0xcc5de8];
            
            document.getElementById('model-list').innerHTML = ""; 
            modelsGroup.clear();
            annotationMeshes.forEach(a => scene.remove(a.mesh)); 
            annotationMeshes = []; 
            document.getElementById('comment-list').innerHTML = "";

            const loadPromises = (data || []).map(async (f, ci) => {
                if(f.name.startsWith('.') || f.name.endsWith('.json')) return;
                const { data: pu } = supabase.storage.from('models').getPublicUrl(`shared/${id}/${f.name}`);
                return renderModel(pu.publicUrl, f.name, cols[ci % cols.length], !!targetId);
            });

            await Promise.all(loadPromises);
            
            const b = new THREE.Box3().setFromObject(modelsGroup); 
            markerRadius = Math.max(b.getSize(new THREE.Vector3()).x, b.getSize(new THREE.Vector3()).y, b.getSize(new THREE.Vector3()).z) * 0.012;
            controls.target.copy(b.getCenter(new THREE.Vector3())); controls.update();
            await loadAnnotations(id);
            document.getElementById('loader-overlay').style.display = 'none';
        }

        async function renderModel(url, name, col, isU) {
            const isSTL = name.toLowerCase().endsWith('.stl');
            const l = isSTL ? new STLLoader() : new OBJLoader();
            
            return new Promise((res) => {
                l.load(url, (r) => {
                    const m = new THREE.MeshStandardMaterial({ color: col, roughness: 0.5, metalness: 0.2, side: THREE.DoubleSide, transparent: true, opacity: 1 });
                    
                    let model;
                    if (isSTL) {
                        // STL vrací přímo BufferGeometry
                        model = new THREE.Mesh(r, m);
                    } else {
                        // OBJ vrací Group
                        r.traverse(c => { if (c.isMesh) c.material = m; });
                        model = r;
                    }
                    
                    modelsGroup.add(model);
                    
                    const d = document.createElement('div'); d.className = 'model-item'; const cs = '#' + new THREE.Color(col).getHexString();
                    d.style.borderLeftColor = cs;
                    const disp = name.replace(/\.(stl|obj)$/i, '');
                    d.innerHTML = `<div class="model-item-top"><div class="model-item-left"><input type="checkbox" checked><label style="color:${cs}">${disp}</label></div>${isU ? '<span class="del-file-btn">×</span>' : ""}</div><input type="range" class="opacity-slider" min="0" max="1" step="0.01" value="1"><div class="slider-label">Viditelnost</div>`;
                    d.querySelector('input[type="checkbox"]').onchange = (e) => { model.visible = e.target.checked; };
                    d.querySelector('.opacity-slider').oninput = (e) => {
                        const val = parseFloat(e.target.value);
                        if (isSTL) model.material.opacity = val;
                        else model.traverse(c => { if(c.isMesh) c.material.opacity = val; });
                    };
                    if(isU) d.querySelector('.del-file-btn').onclick = async () => {
                        if(confirm(`Smazat ${disp}?`)) { await supabase.storage.from('models').remove([`shared/${currentSessionId}/${name}`]); modelsGroup.remove(model); d.remove(); }
                    };
                    document.getElementById('model-list').appendChild(d); res();
                }, undefined, (err) => { console.error(err); res(); });
            });
        }

        // --- KOMENTÁŘE A KOSTKA ---
        const btnAddComment = document.getElementById('add-comment-toggle');
        btnAddComment.onclick = () => {
            isAddingComment = !isAddingComment;
            btnAddComment.classList.toggle('active');
            btnAddComment.innerText = isAddingComment ? '📍 Klikněte na model...' : '➕ Přidat komentář';
        };

        const raycaster = new THREE.Raycaster();
        const mouseVector = new THREE.Vector2();

        document.getElementById('viewer').addEventListener('dblclick', async (e) => {
            if (!isAddingComment || !currentSessionId) return;
            mouseVector.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouseVector.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouseVector, camera);
            const intersects = raycaster.intersectObject(modelsGroup, true);
            if (intersects.length > 0) {
                const text = prompt("Zadejte text komentáře:");
                if (text) {
                    const color = commentColors[annotationMeshes.length % commentColors.length];
                    await addAnnotation(intersects[0].point, text, color);
                    await saveAnnotations();
                }
                isAddingComment = false;
                btnAddComment.classList.remove('active');
                btnAddComment.innerText = '➕ Přidat komentář';
            }
        });

        async function addAnnotation(pos, text, color) {
            const geo = new THREE.SphereGeometry(markerRadius, 32, 32);
            const mat = new THREE.MeshBasicMaterial({ color: color });
            const sphere = new THREE.Mesh(geo, mat);
            sphere.position.copy(pos);
            scene.add(sphere);
            const annot = { id: Date.now() + Math.random(), pos: {x: pos.x, y: pos.y, z: pos.z}, text, color, mesh: sphere };
            annotationMeshes.push(annot);
            renderCommentUI(annot);
        }

        function renderCommentUI(annot) {
            const list = document.getElementById('comment-list');
            const div = document.createElement('div');
            div.className = 'comment-item';
            div.style.borderLeftColor = '#' + new THREE.Color(annot.color).getHexString();
            div.innerHTML = `<div class="comment-text" title="${annot.text}">${annot.text}</div><div class="comment-del">×</div>`;
            div.onclick = () => {
                controls.target.set(annot.pos.x, annot.pos.y, annot.pos.z);
                camera.position.set(annot.pos.x + markerRadius*20, annot.pos.y + markerRadius*20, annot.pos.z + markerRadius*20);
                controls.update();
            };
            div.querySelector('.comment-del').onclick = async (e) => {
                e.stopPropagation(); scene.remove(annot.mesh);
                annotationMeshes = annotationMeshes.filter(a => a.id !== annot.id);
                div.remove(); await saveAnnotations();
            };
            list.appendChild(div);
        }

        async function saveAnnotations() {
            const data = annotationMeshes.map(a => ({ pos: a.pos, text: a.text, color: a.color }));
            await supabase.storage.from('models').remove([`shared/${currentSessionId}/annotations.json`]);
            if(data.length > 0) await supabase.storage.from('models').upload(`shared/${currentSessionId}/annotations.json`, new Blob([JSON.stringify(data)], { type: 'application/json' }));
        }

        async function loadAnnotations(id) {
            const { data } = await supabase.storage.from('models').download(`shared/${id}/annotations.json`);
            if (data) {
                const list = JSON.parse(await data.text());
                for (const a of list) await addAnnotation(new THREE.Vector3(a.pos.x, a.pos.y, a.pos.z), a.text, a.color);
            }
        }

        const cubeCont = document.getElementById('viewcube-container');
        const cubeScene = new THREE.Scene();
        const cubeCam = new THREE.PerspectiveCamera(45, 1, 0.1, 500); cubeCam.position.set(0, 0, 200);
        const cubeRen = new THREE.WebGLRenderer({ antialias: true, alpha: true }); cubeRen.setSize(cubeSize, cubeSize);
        cubeCont.appendChild(cubeRen.domElement);

        function createLbl(txt, col) {
            const canv = document.createElement('canvas'); canv.width = 128; canv.height = 128;
            const ctx = canv.getContext('2d'); ctx.fillStyle = '#333'; ctx.fillRect(0, 0, 128, 128);
            ctx.strokeStyle = '#666'; ctx.lineWidth = 6; ctx.strokeRect(0, 0, 128, 128);
            ctx.fillStyle = col; ctx.font = 'bold 20px Segoe UI'; ctx.textAlign = 'center'; ctx.fillText(txt, 64, 75);
            return new THREE.CanvasTexture(canv);
        }

        const orientCube = new THREE.Mesh(new THREE.BoxGeometry(85, 85, 85), [
            new THREE.MeshBasicMaterial({ map: createLbl('LATERAL', '#ff4444') }), 
            new THREE.MeshBasicMaterial({ map: createLbl('MEDIAL', '#ff4444') }),
            new THREE.MeshBasicMaterial({ map: createLbl('SUPERIOR', '#44ff44') }),
            new THREE.MeshBasicMaterial({ map: createLbl('INFERIOR', '#ffff00') }), 
            new THREE.MeshBasicMaterial({ map: createLbl('ANTERIOR', '#4444ff') }),
            new THREE.MeshBasicMaterial({ map: createLbl('POSTERIOR', '#4444ff') })
        ]);
        cubeScene.add(orientCube);

        cubeCont.addEventListener('click', (e) => {
            const r = cubeRen.domElement.getBoundingClientRect();
            const m = new THREE.Vector2(((e.clientX - r.left) / cubeSize) * 2 - 1, -((e.clientY - r.top) / cubeSize) * 2 + 1);
            const rc = new THREE.Raycaster(); rc.setFromCamera(m, cubeCam);
            const hits = rc.intersectObject(orientCube);
            if (hits.length > 0) {
                const b = new THREE.Box3().setFromObject(modelsGroup); const c = b.getCenter(new THREE.Vector3());
                const d = Math.max(b.getSize(new THREE.Vector3()).x, b.getSize(new THREE.Vector3()).y, b.getSize(new THREE.Vector3()).z) * 1.8 || 250;
                const idx = Math.floor(hits[0].faceIndex / 2);
                const p = [new THREE.Vector3(c.x + d, c.y, c.z), new THREE.Vector3(c.x - d, c.y, c.z), new THREE.Vector3(c.x, c.y + d, c.z), new THREE.Vector3(c.x, c.y - d, c.z), new THREE.Vector3(c.x, c.y, c.z + d), new THREE.Vector3(c.x, c.y, c.z - d)];
                camera.position.copy(p[idx]); controls.target.copy(c); controls.update();
            }
        });

        document.getElementById('file-input').onchange = async (e) => {
            if(!currentSessionId) currentSessionId = Math.random().toString(36).substring(2, 10);
            document.getElementById('loader-overlay').style.display = 'flex';
            for (const f of e.target.files) {
                if (f.name.endsWith('.zip')) {
                    const z = await JSZip.loadAsync(f);
                    for (const [p, en] of Object.entries(z.files)) {
                        if (!en.dir && (p.endsWith('.stl') || p.endsWith('.obj'))) await supabase.storage.from('models').upload(`shared/${currentSessionId}/${p.split('/').pop()}`, await en.async("blob"));
                    }
                } else await supabase.storage.from('models').upload(`shared/${currentSessionId}/${f.name}`, f);
            }
            const u = `${window.location.origin}${window.location.pathname}?id=${currentSessionId}`;
            document.getElementById('share-link').href = u; document.getElementById('share-link').innerText = u; document.getElementById('link-container').style.display = 'block';
            await fetchModels(currentSessionId);
        };

        document.getElementById('copy-link-btn').onclick = () => {
            navigator.clipboard.writeText(document.getElementById('share-link').innerText).then(() => {
                document.getElementById('copy-link-btn').innerText = "Hotovo!";
                setTimeout(() => document.getElementById('copy-link-btn').innerText = "Kopírovat", 2000);
            });
        };

        document.getElementById('delete-all-btn').onclick = async () => {
            if(confirm("Smazat vše?")) {
                const { data } = await supabase.storage.from('models').list(`shared/${currentSessionId}`);
                if(data) await supabase.storage.from('models').remove(data.map(f => `shared/${currentSessionId}/${f.name}`));
                location.reload();
            }
        };

        document.getElementById('reset-btn').onclick = () => window.location.href = window.location.pathname;

        function anim() {
            requestAnimationFrame(anim); controls.update();
            orientCube.quaternion.copy(camera.quaternion).invert();
            renderer.render(scene, camera); cubeRen.render(cubeScene, cubeCam);
        }
        
        if(currentSessionId && window.location.search.includes('id=')) fetchModels();
        anim();
        window.onresize = () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); };
    </script>
</body>
</html>
