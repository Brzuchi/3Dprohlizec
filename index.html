<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prohlížeč modelů💾</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1a1a1a; color: white; }
        #ui-container { position: absolute; top: 20px; left: 20px; background: rgba(30, 30, 30, 0.9); border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); min-width: 280px; max-width: 350px; z-index: 10; border: 1px solid #444; }
        .header-bar { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: rgba(10, 10, 10, 0.6); border-radius: 10px 10px 0 0; cursor: pointer; user-select: none; }
        .header-bar h2 { margin: 0; font-size: 1.2em; pointer-events: none; }
        #ui-content { padding: 0 20px 20px 20px; max-height: 75vh; overflow-y: auto; display: block; }
        #ui-content.collapsed { display: none; } 
        .upload-section { margin-top: 15px; margin-bottom: 20px; border-bottom: 1px solid #555; padding-bottom: 20px; }
        .upload-btn { background: #007bff; color: white; padding: 10px; border-radius: 5px; cursor: pointer; text-align: center; display: block; font-weight: 600; transition: background 0.2s;}
        .upload-btn:hover { background: #0056b3; }
        input[type="file"] { display: none; }
        .reset-btn { background: #dc3545; color: white; padding: 8px; border-radius: 5px; cursor: pointer; text-align: center; display: block; font-weight: 600; width: 100%; border: none; margin-top: 10px; transition: background 0.2s;}
        #link-container { display: none; margin-top: 15px; padding: 12px; background: rgba(0, 123, 255, 0.1); border: 1px solid #007bff; border-radius: 5px; }
        .generated-link { display: block; margin-top: 8px; color: #00a2ff; word-break: break-all; font-size: 0.85em; text-decoration: none; font-family: monospace; background: rgba(0,0,0,0.3); padding: 5px; border-radius: 3px; }
        .model-item { margin-top: 12px; display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.05); padding: 8px 12px; border-radius: 5px; border-left: 4px solid transparent; }
        .model-item-left { display: flex; align-items: center; }
        .model-item input[type="checkbox"] { margin-right: 12px; cursor: pointer; width: 18px; height: 18px; }
        .model-item label { cursor: pointer; word-break: break-all; font-weight: 600; font-size: 0.9em;}
        #viewer { width: 100vw; height: 100vh; display: block; }
        #loader-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 100; flex-direction: column; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="loader-overlay">
        <div style="border: 4px solid #f3f3f3; border-top: 4px solid #007bff; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite;"></div>
        <p id="loader-text" style="margin-top: 15px;">Pracuji na tom...</p>
    </div>

    <div id="ui-container">
        <div id="toggle-menu-btn" class="header-bar">
            <h2>⚙️ Správce modelů</h2>
            <span id="toggle-icon" style="transition: transform 0.2s; font-size: 1.2em;">▼</span>
        </div>
        <div id="ui-content">
            <!-- Tato sekce se skryje pro lidi s linkem -->
            <div id="upload-box" class="upload-section">
                <label class="upload-btn">Nahrát STL / OBJ / ZIP
                    <input type="file" id="file-input" multiple accept=".stl, .obj, .zip">
                </label>
                <div id="link-container">
                    <strong style="color: #00a2ff;">Odkaz pro sdílení:</strong>
                    <a id="share-link" class="generated-link" href="#" target="_blank"></a>
                </div>
                <button id="reset-btn" class="reset-btn" style="display: none;">Vytvořit novou sestavu</button>
            </div>
            <!-- Seznam modelů zůstane viditelný pro všechny -->
            <div id="model-list"><em id="empty-msg" style="color: #aaa; font-size: 0.9em;">Zatím nebyly nahrány žádné modely.</em></div>
        </div>
    </div>
    <div id="viewer"></div>

    <script type="module">
        import * as THREE from 'three';
        import { STLLoader } from 'three/addons/loaders/STLLoader.js';
        import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

        const SUPABASE_URL = 'https://aukjrwkjvuhmbfqqgoav.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_YvrqIr_5PQY-wftqvZDcYA_Mu_HuKT3';
        const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

        // --- DEFINICE PRVKŮ (Opraveno) ---
        const toggleMenuBtn = document.getElementById('toggle-menu-btn');
        const uiContent = document.getElementById('ui-content');
        const toggleIcon = document.getElementById('toggle-icon');
        const uploadBox = document.getElementById('upload-box');
        const fileInput = document.getElementById('file-input');
        const linkContainer = document.getElementById('link-container');
        const shareLink = document.getElementById('share-link');
        const modelList = document.getElementById('model-list');
        const loaderOverlay = document.getElementById('loader-overlay');
        const resetBtn = document.getElementById('reset-btn');

        // --- FUNKČNÍ ROLETKA ---
        toggleMenuBtn.onclick = () => {
            uiContent.classList.toggle('collapsed');
            toggleIcon.style.transform = uiContent.classList.contains('collapsed') ? 'rotate(-90deg)' : 'rotate(0deg)';
        };

        const modelsGroup = new THREE.Group();
        modelsGroup.rotation.x = -Math.PI / 2;

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a1a);
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 10000);
        camera.position.set(150, 150, 150);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('viewer').appendChild(renderer.domElement);
        const controls = new OrbitControls(camera, renderer.domElement);
        scene.add(new THREE.AmbientLight(0xffffff, 0.7));
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
        dirLight.position.set(100, 100, 100);
        scene.add(dirLight);
        scene.add(modelsGroup);

        async function fetchSharedModels(targetId) {
            const id = targetId || new URLSearchParams(window.location.search).get('id');
            if (!id) return;

            // Skrytí nahrávání pro koncového uživatele (pokud přišel přes link)
            if (!targetId) {
                uploadBox.style.display = 'none';
                resetBtn.style.display = 'block';
            }

            loaderOverlay.style.display = 'flex';
            const { data } = await supabase.storage.from('models').list(`shared/${id}`);
            
            // Rozšířená paleta barev
            const colors = [
                0x007bff, 0xdc3545, 0x28a745, 0xffc107, 0x17a2b8, 0x6f42c1, 
                0xfd7e14, 0xe83e8c, 0x20c997, 0x6610f2, 0xadb5bd, 0x94d82d, 
                0xff922b, 0x51cf66, 0x339af0, 0xcc5de8, 0xf06595, 0xffd43b, 
                0x845ef7, 0x00d4ff, 0x5c940d, 0xd9480f, 0x0c85d0, 0xa61e4d
            ];
            
            let colorIdx = 0;
            for (const file of (data || [])) {
                if(file.name.startsWith('.')) continue;
                const { data: pUrl } = supabase.storage.from('models').getPublicUrl(`shared/${id}/${file.name}`);
                await loadAndRender(pUrl.publicUrl, file.name, colors[colorIdx++ % colors.length]);
            }
            
            const box = new THREE.Box3().setFromObject(modelsGroup);
            const center = box.getCenter(new THREE.Vector3());
            const size = box.getSize(new THREE.Vector3());
            const maxDim = Math.max(size.x, size.y, size.z);
            camera.position.set(center.x + maxDim, center.y + maxDim, center.z + maxDim);
            controls.target.copy(center);
            controls.update();
            loaderOverlay.style.display = 'none';
        }

        async function loadAndRender(url, name, color) {
            const loader = name.toLowerCase().endsWith('.obj') ? new OBJLoader() : new STLLoader();
            return new Promise(res => {
                loader.load(url, (result) => {
                    const material = new THREE.MeshStandardMaterial({ color, roughness: 0.5, metalness: 0.2, side: THREE.DoubleSide });
                    let mesh;
                    if(result.isMesh) {
                        mesh = result;
                        mesh.material = material;
                    } else {
                        result.traverse(c => { if(c.isMesh) c.material = material; });
                        mesh = result;
                    }
                    modelsGroup.add(mesh);
                    
                    const emptyMsg = document.getElementById('empty-msg');
                    if (emptyMsg) emptyMsg.style.display = 'none';
                    
                    const div = document.createElement('div');
                    div.className = 'model-item';
                    const colorStr = '#' + new THREE.Color(color).getHexString();
                    div.style.borderLeftColor = colorStr;
                    div.innerHTML = `<div class="model-item-left"><input type="checkbox" checked id="c-${name}"><label for="c-${name}" style="color:${colorStr}">${name}</label></div>`;
                    div.querySelector('input').onchange = (e) => { mesh.visible = e.target.checked; };
                    modelList.appendChild(div);
                    res();
                });
            });
        }

        fileInput.onchange = async (e) => {
            const sessionId = Math.random().toString(36).substring(2, 10);
            loaderOverlay.style.display = 'flex';
            for (const file of e.target.files) {
                if (file.name.endsWith('.zip')) {
                    const zip = await JSZip.loadAsync(file);
                    for (const [path, entry] of Object.entries(zip.files)) {
                        if (!entry.dir && (path.endsWith('.stl') || path.endsWith('.obj'))) {
                            await supabase.storage.from('models').upload(`shared/${sessionId}/${path.split('/').pop()}`, await entry.async("blob"));
                        }
                    }
                } else {
                    await supabase.storage.from('models').upload(`shared/${sessionId}/${file.name}`, file);
                }
            }
            const url = `${window.location.origin}${window.location.pathname}?id=${sessionId}`;
            shareLink.href = url; shareLink.innerText = url; linkContainer.style.display = 'block';
            await fetchSharedModels(sessionId);
        };

        resetBtn.onclick = () => window.location.href = window.location.pathname;

        if(window.location.search.includes('id=')) fetchSharedModels();
        function animate() { requestAnimationFrame(animate); controls.update(); renderer.render(scene, camera); }
        animate();
        window.onresize = () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); };
    </script>
</body>
</html>
