<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D prohlížeč 💾</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1a1a1a; color: white; }
        #ui-container { position: absolute; top: 20px; left: 20px; background: rgba(30, 30, 30, 0.9); border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); min-width: 300px; max-width: 380px; z-index: 10; border: 1px solid #444; display: flex; flex-direction: column; max-height: 90vh; }
        
        /* Toolbar */
        .toolbar { display: flex; background: rgba(10, 10, 10, 0.8); border-radius: 10px 10px 0 0; padding: 10px; gap: 5px; border-bottom: 1px solid #444; }
        .tool-btn { flex: 1; padding: 8px 5px; background: #333; color: white; border: 1px solid #555; border-radius: 5px; cursor: pointer; font-size: 0.85em; font-weight: bold; transition: 0.2s; }
        .tool-btn:hover { background: #444; }
        .tool-btn.active { background: #007bff; border-color: #007bff; }

        .header-bar { display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; background: rgba(20, 20, 20, 0.6); cursor: pointer; user-select: none; border-bottom: 1px solid #444; }
        .header-bar h2 { margin: 0; font-size: 1em; pointer-events: none; }
        
        .ui-section-content { padding: 15px 20px; overflow-y: auto; display: block; }
        .ui-section-content.collapsed { display: none; } 

        .upload-btn { background: #28a745; color: white; padding: 10px; border-radius: 5px; cursor: pointer; text-align: center; display: block; font-weight: 600; margin-bottom: 10px;}
        input[type="file"] { display: none; }
        .btn-group { display: flex; gap: 8px; margin-bottom: 15px; }
        .reset-btn, .delete-all-btn { padding: 8px; border-radius: 5px; cursor: pointer; text-align: center; flex: 1; font-weight: 600; border: none; font-size: 0.85em; color: white; }
        .reset-btn { background: #6c757d; } .delete-all-btn { background: #dc3545; }

        /* Položky seznamu */
        .item-row { margin-top: 10px; display: flex; flex-direction: column; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 5px; border-left: 4px solid transparent; }
        .item-top { display: flex; justify-content: space-between; align-items: center; }
        .item-left { display: flex; align-items: center; overflow: hidden; flex: 1;}
        .item-left input[type="checkbox"] { margin-right: 10px; cursor: pointer; }
        .item-left label { cursor: pointer; font-weight: 600; font-size: 0.85em; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .item-actions { display: flex; gap: 8px; }
        .icon-btn { cursor: pointer; font-size: 1.1em; opacity: 0.7; transition: 0.2s; }
        .icon-btn:hover { opacity: 1; }
        .del-btn { color: #dc3545; }
        .edit-btn { color: #ffc107; }

        .slider-group { margin-top: 8px; }
        .slider-group input { width: 100%; height: 3px; accent-color: #007bff; cursor: pointer; }
        .slider-label { font-size: 0.65em; color: #888; text-transform: uppercase; margin-top: 2px;}

        /* Řezné roviny */
        .clipping-section { background: rgba(0,0,0,0.3); padding: 10px; border-radius: 5px; margin-bottom: 15px; border: 1px dashed #555; }
        .clipping-section h3 { font-size: 0.85em; margin: 0 0 10px 0; color: #aaa; text-transform: uppercase; }

        #viewcube-container { position: absolute; top: 20px; right: 20px; width: 130px; height: 130px; z-index: 20; }
        #viewer { width: 100vw; height: 100vh; display: block; }
        #loader-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 100; flex-direction: column; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Pllovoucí texty měření */
        .measure-label { position: absolute; background: rgba(0,0,0,0.7); color: #00ff00; padding: 4px 8px; border-radius: 4px; font-family: monospace; font-weight: bold; font-size: 12px; pointer-events: none; border: 1px solid #00ff00; transform: translate(-50%, -50%); z-index: 5; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script type="importmap"> { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } } </script>
</head>
<body>
    <div id="loader-overlay"><div style="border: 4px solid #f3f3f3; border-top: 4px solid #007bff; border-radius: 50%; width: 35px; height: 35px; animation: spin 1s linear infinite;"></div></div>
    
    <div id="labels-container"></div> <!-- Kontejner pro 2D štítky měření -->

    <div id="ui-container">
        <!-- NÁSTROJE -->
        <div class="toolbar">
            <button id="tool-view" class="tool-btn active">🖐️ Prohlížet</button>
            <button id="tool-paint" class="tool-btn">🖌️ Malovat</button>
            <button id="tool-measure" class="tool-btn">📏 Měřit</button>
        </div>

        <div class="header-bar" onclick="toggleSection('ui-models', 'icon-models')">
            <h2>⚙️ Modely a ořezy</h2><span id="icon-models">▼</span>
        </div>
        <div id="ui-models" class="ui-section-content">
            <label class="upload-btn">Nahrát STL / OBJ / ZIP <input type="file" id="file-input" multiple accept=".stl, .obj, .zip"></label>
            <div class="btn-group">
                <button id="reset-btn" class="reset-btn" style="display: none;">Nová práce</button>
                <button id="delete-all-btn" class="delete-all-btn" style="display: none;">Smazat vše</button>
            </div>
            
            <!-- Clipping Planes UI -->
            <div class="clipping-section">
                <h3>Řezné roviny</h3>
                <div class="slider-group"><input type="range" id="clip-x" min="-300" max="300" value="300" step="1"><div class="slider-label">Odřez X (Sagitální)</div></div>
                <div class="slider-group"><input type="range" id="clip-y" min="-300" max="300" value="300" step="1"><div class="slider-label">Odřez Y (Axiální)</div></div>
                <div class="slider-group"><input type="range" id="clip-z" min="-300" max="300" value="300" step="1"><div class="slider-label">Odřez Z (Koronární)</div></div>
            </div>

            <div id="model-list"></div>
        </div>

        <div class="header-bar" onclick="toggleSection('ui-comments', 'icon-comments')">
            <h2>💬 Značky a měření</h2><span id="icon-comments">▼</span>
        </div>
        <div id="ui-comments" class="ui-section-content">
            <div id="comment-list" style="margin-bottom: 20px;"><em>Zatím žádná data. Použijte nástroje nahoře.</em></div>
        </div>
    </div>

    <div id="viewcube-container"></div>
    <div id="viewer"></div>

    <script type="module">
        import * as THREE from 'three';
        import { STLLoader } from 'three/addons/loaders/STLLoader.js';
        import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

        const supabase = createClient('https://aukjrwkjvuhmbfqqgoav.supabase.co', 'sb_publishable_YvrqIr_5PQY-wftqvZDcYA_Mu_HuKT3');
        const cubeSize = 130;
        let currentSessionId = new URLSearchParams(window.location.search).get('id');
        
        // Stavy aplikace
        let currentTool = 'view'; // view, paint, measure
        let isInteracting = false;
        
        // Globální data
        let annotations = []; // { id, type, data, text, color, visible, meshGroup, htmlElement }
        const commentColors = [0x005A3B, 0xff0000, 0x00ff00, 0x0000ff, 0xffff00, 0xff00ff, 0x1A1A1A, 0xffa500];
        
        // Měřící a malovací buffer
        let currentStroke = [];
        let tempPaintGroup = null;
        let measureStartPoint = null;
        let tempMeasureLine = null;

        // THREE.js Setup
        const scene = new THREE.Scene(); scene.background = new THREE.Color(0x1a1a1a);
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 10000); camera.position.set(200, 200, 200);
        const renderer = new THREE.WebGLRenderer({ antialias: true }); renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.localClippingEnabled = true; // DŮLEŽITÉ PRO ŘEZNÉ ROVINY
        document.getElementById('viewer').appendChild(renderer.domElement);
        const controls = new OrbitControls(camera, renderer.domElement); controls.enableDamping = true;
        
        scene.add(new THREE.AmbientLight(0xffffff, 0.7));
        const dl = new THREE.DirectionalLight(0xffffff, 1.2); dl.position.set(100, 100, 100); scene.add(dl);
        const modelsGroup = new THREE.Group(); modelsGroup.rotation.x = -Math.PI/2; scene.add(modelsGroup);
        const annotationsGroup = new THREE.Group(); scene.add(annotationsGroup); // Nemá rotaci, koordináty jsou reálné k světu

        // Řezné roviny (Clipping Planes)
        const clipX = new THREE.Plane(new THREE.Vector3(-1, 0, 0), 300);
        const clipY = new THREE.Plane(new THREE.Vector3(0, -1, 0), 300);
        const clipZ = new THREE.Plane(new THREE.Vector3(0, 0, -1), 300);
        const globalClipPlanes = [clipX, clipY, clipZ];

        document.getElementById('clip-x').oninput = e => { clipX.constant = parseFloat(e.target.value); };
        document.getElementById('clip-y').oninput = e => { clipY.constant = parseFloat(e.target.value); };
        document.getElementById('clip-z').oninput = e => { clipZ.constant = parseFloat(e.target.value); };

        window.toggleSection = (id, iconId) => {
            const el = document.getElementById(id); const icon = document.getElementById(iconId);
            if (el && icon) { el.classList.toggle('collapsed'); icon.style.transform = el.classList.contains('collapsed') ? 'rotate(-90deg)' : 'rotate(0deg)'; }
        };

        // --- NÁSTROJE LOGIKA ---
        const raycaster = new THREE.Raycaster();
        const mouseVec = new THREE.Vector2();

        document.querySelectorAll('.tool-btn').forEach(btn => {
            btn.onclick = (e) => {
                document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentTool = btn.id.replace('tool-', '');
                controls.enabled = (currentTool === 'view'); // Orbity fungují jen ve view
                
                // Úklid měření, pokud uživatel překlikne v průběhu
                measureStartPoint = null;
                if(tempMeasureLine) { scene.remove(tempMeasureLine); tempMeasureLine = null; }
            };
        });

        // Události myši pro modely
        const viewerDiv = document.getElementById('viewer');
        
        viewerDiv.addEventListener('pointerdown', (e) => {
            if (currentTool === 'view') return;
            if (e.button !== 0) return; // Jen levé tlačítko

            mouseVec.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouseVec.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouseVec, camera);
            const hits = raycaster.intersectObject(modelsGroup, true);

            if (hits.length > 0) {
                if (currentTool === 'paint') {
                    isInteracting = true;
                    currentStroke = [hits[0].point.clone()];
                    tempPaintGroup = new THREE.Group();
                    annotationsGroup.add(tempPaintGroup);
                    addSphereToGroup(tempPaintGroup, hits[0].point, 0xffffff); // Dočasná barva
                } 
                else if (currentTool === 'measure') {
                    if (!measureStartPoint) {
                        measureStartPoint = hits[0].point.clone();
                        tempPaintGroup = new THREE.Group();
                        annotationsGroup.add(tempPaintGroup);
                        addSphereToGroup(tempPaintGroup, measureStartPoint, 0x00ff00);
                    } else {
                        // Druhý klik - uložení měření
                        const p2 = hits[0].point.clone();
                        const dist = measureStartPoint.distanceTo(p2);
                        finishMeasurement(measureStartPoint, p2, dist);
                        measureStartPoint = null;
                        if(tempPaintGroup) { annotationsGroup.remove(tempPaintGroup); tempPaintGroup = null; }
                        if(tempMeasureLine) { scene.remove(tempMeasureLine); tempMeasureLine = null; }
                    }
                }
            }
        });

        viewerDiv.addEventListener('pointermove', (e) => {
            if (currentTool === 'view') return;
            
            mouseVec.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouseVec.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouseVec, camera);

            if (currentTool === 'paint' && isInteracting) {
                const hits = raycaster.intersectObject(modelsGroup, true);
                if (hits.length > 0) {
                    const pt = hits[0].point.clone();
                    // Zaznamenat jen pokud ujel dostatečnou vzdálenost (optimalizace sítě)
                    if (pt.distanceTo(currentStroke[currentStroke.length - 1]) > 2) {
                        currentStroke.push(pt);
                        addSphereToGroup(tempPaintGroup, pt, 0xffffff);
                    }
                }
            } 
            else if (currentTool === 'measure' && measureStartPoint) {
                const hits = raycaster.intersectObject(modelsGroup, true);
                if (hits.length > 0) {
                    if(tempMeasureLine) scene.remove(tempMeasureLine);
                    const mat = new THREE.LineBasicMaterial({ color: 0x00ff00, linewidth: 2 });
                    const geo = new THREE.BufferGeometry().setFromPoints([measureStartPoint, hits[0].point]);
                    tempMeasureLine = new THREE.Line(geo, mat);
                    scene.add(tempMeasureLine);
                }
            }
        });

        viewerDiv.addEventListener('pointerup', async (e) => {
            if (currentTool === 'paint' && isInteracting) {
                isInteracting = false;
                if (currentStroke.length > 0) {
                    const text = prompt("Komentář k nákresu:");
                    if (text) {
                        const color = commentColors[annotations.length % commentColors.length];
                        await finishPaintStroke(currentStroke, text, color);
                    }
                    // Odstranit dočasnou kresbu
                    annotationsGroup.remove(tempPaintGroup); tempPaintGroup = null; currentStroke = [];
                }
            }
        });

        function addSphereToGroup(group, pos, color) {
            const m = new THREE.MeshBasicMaterial({ color: color });
            const s = new THREE.Mesh(new THREE.SphereGeometry(2, 16, 16), m);
            s.position.copy(pos);
            group.add(s);
        }

        async function finishPaintStroke(points, text, color) {
            const grp = new THREE.Group();
            points.forEach(p => addSphereToGroup(grp, p, color));
            annotationsGroup.add(grp);
            
            const annot = { id: Date.now(), type: 'paint', data: points.map(p=>({x:p.x, y:p.y, z:p.z})), text, color, visible: true, meshGroup: grp };
            annotations.push(annot);
            renderAnnotationUI(annot);
            await saveAnnotations();
        }

        async function finishMeasurement(p1, p2, dist) {
            const grp = new THREE.Group();
            addSphereToGroup(grp, p1, 0x00ff00);
            addSphereToGroup(grp, p2, 0x00ff00);
            const line = new THREE.Line(new THREE.BufferGeometry().setFromPoints([p1, p2]), new THREE.LineBasicMaterial({ color: 0x00ff00 }));
            grp.add(line);
            annotationsGroup.add(grp);

            const text = `${dist.toFixed(2)} mm`;
            
            // HTML štítek
            const div = document.createElement('div');
            div.className = 'measure-label'; div.innerText = text;
            document.getElementById('labels-container').appendChild(div);

            const annot = { id: Date.now(), type: 'measure', data: {p1, p2, dist}, text, color: 0x00ff00, visible: true, meshGroup: grp, htmlElement: div };
            annotations.push(annot);
            renderAnnotationUI(annot);
            await saveAnnotations();
        }

        // --- UI PRO ANOTACE ---
        function renderAnnotationUI(annot) {
            document.getElementById('comment-list').querySelector('em')?.remove();
            const list = document.getElementById('comment-list');
            const div = document.createElement('div');
            div.className = 'item-row';
            div.style.borderLeftColor = '#' + new THREE.Color(annot.color).getHexString();
            
            div.innerHTML = `
                <div class="item-top">
                    <div class="item-left">
                        <input type="checkbox" checked title="Zobrazit/Skrýt">
                        <label title="${annot.text}">${annot.type === 'measure' ? '📏' : '🖌️'} ${annot.text}</label>
                    </div>
                    <div class="item-actions">
                        ${annot.type === 'paint' ? '<span class="icon-btn edit-btn" title="Upravit text">✏️</span>' : ''}
                        <span class="icon-btn del-btn" title="Smazat">🗑️</span>
                    </div>
                </div>
            `;
            
            div.querySelector('input[type="checkbox"]').onchange = (e) => { 
                annot.visible = e.target.checked;
                annot.meshGroup.visible = annot.visible;
                if(annot.htmlElement) annot.htmlElement.style.display = annot.visible ? 'block' : 'none';
            };

            if (annot.type === 'paint') {
                div.querySelector('.edit-btn').onclick = async (e) => {
                    const newText = prompt("Upravit text:", annot.text);
                    if (newText) {
                        annot.text = newText;
                        div.querySelector('label').innerText = `🖌️ ${newText}`;
                        await saveAnnotations();
                    }
                };
            }

            div.querySelector('.del-btn').onclick = async () => {
                if(confirm("Opravdu smazat?")) {
                    annotationsGroup.remove(annot.meshGroup);
                    if(annot.htmlElement) annot.htmlElement.remove();
                    annotations = annotations.filter(a => a.id !== annot.id);
                    div.remove();
                    if(annotations.length === 0) list.innerHTML = '<em>Zatím žádná data. Použijte nástroje nahoře.</em>';
                    await saveAnnotations();
                }
            };
            list.appendChild(div);
        }

        async function saveAnnotations() {
            if(!currentSessionId) return;
            const payload = annotations.map(a => ({ id: a.id, type: a.type, data: a.data, text: a.text, color: a.color }));
            await supabase.storage.from('models').remove([`shared/${currentSessionId}/annotations.json`]);
            if(payload.length > 0) await supabase.storage.from('models').upload(`shared/${currentSessionId}/annotations.json`, new Blob([JSON.stringify(payload)], { type: 'application/json' }));
        }

        async function loadAnnotations(id) {
            const { data } = await supabase.storage.from('models').download(`shared/${id}/annotations.json`);
            if (data) {
                const list = JSON.parse(await data.text());
                for (const a of list) {
                    if (a.type === 'paint') {
                        const pts = a.data.map(p => new THREE.Vector3(p.x, p.y, p.z));
                        const grp = new THREE.Group();
                        pts.forEach(p => addSphereToGroup(grp, p, a.color));
                        annotationsGroup.add(grp);
                        const annot = { ...a, visible: true, meshGroup: grp };
                        annotations.push(annot); renderAnnotationUI(annot);
                    } else if (a.type === 'measure') {
                        const p1 = new THREE.Vector3(a.data.p1.x, a.data.p1.y, a.data.p1.z);
                        const p2 = new THREE.Vector3(a.data.p2.x, a.data.p2.y, a.data.p2.z);
                        const grp = new THREE.Group();
                        addSphereToGroup(grp, p1, a.color); addSphereToGroup(grp, p2, a.color);
                        grp.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([p1, p2]), new THREE.LineBasicMaterial({ color: a.color })));
                        annotationsGroup.add(grp);
                        const div = document.createElement('div'); div.className = 'measure-label'; div.innerText = a.text;
                        document.getElementById('labels-container').appendChild(div);
                        const annot = { ...a, visible: true, meshGroup: grp, htmlElement: div, data: {p1, p2, dist: a.data.dist} };
                        annotations.push(annot); renderAnnotationUI(annot);
                    }
                }
            }
        }

        // --- NAČÍTÁNÍ MODELŮ ---
        async function fetchModels(targetId) {
            const id = targetId || currentSessionId; if (!id) return;
            if (!targetId) document.querySelector('.upload-btn').style.display = 'none';
            else { document.getElementById('reset-btn').style.display = 'block'; document.getElementById('delete-all-btn').style.display = 'block'; }
            
            document.getElementById('loader-overlay').style.display = 'flex';
            const { data } = await supabase.storage.from('models').list(`shared/${id}`);
            const cols = [0xcccccc, 0x999999, 0xaaaaaa, 0xbbbbbb]; // Decentní barvy modelů pro kontrast s anotacemi
            
            document.getElementById('model-list').innerHTML = ""; 
            modelsGroup.clear(); annotationsGroup.clear(); annotations = []; document.getElementById('comment-list').innerHTML = "<em>Zatím žádná data.</em>";
            document.getElementById('labels-container').innerHTML = '';

            const loadPromises = (data || []).map(async (f, ci) => {
                if(f.name.startsWith('.') || f.name.endsWith('.json')) return;
                const { data: pu } = supabase.storage.from('models').getPublicUrl(`shared/${id}/${f.name}`);
                return renderModel(pu.publicUrl, f.name, cols[ci % cols.length], !!targetId);
            });

            await Promise.all(loadPromises);
            
            const b = new THREE.Box3().setFromObject(modelsGroup); 
            controls.target.copy(b.getCenter(new THREE.Vector3())); controls.update();
            
            // Nastavení limitů pro posuvníky ořezu podle velikosti scény
            const size = b.getSize(new THREE.Vector3());
            const maxDim = Math.max(size.x, size.y, size.z) / 2 + 50;
            ['clip-x','clip-y','clip-z'].forEach(id => { 
                const el = document.getElementById(id); el.max = maxDim; el.min = -maxDim; el.value = maxDim; 
            });
            clipX.constant = maxDim; clipY.constant = maxDim; clipZ.constant = maxDim;

            await loadAnnotations(id);
            document.getElementById('loader-overlay').style.display = 'none';
        }

        async function renderModel(url, name, col, isU) {
            const isSTL = name.toLowerCase().endsWith('.stl');
            const l = isSTL ? new STLLoader() : new OBJLoader();
            return new Promise((res) => {
                l.load(url, (r) => {
                    // MATERIÁL: clippingPlanes aktivují ořez
                    const m = new THREE.MeshStandardMaterial({ color: col, roughness: 0.5, metalness: 0.1, side: THREE.DoubleSide, transparent: true, opacity: 1, clippingPlanes: globalClipPlanes });
                    let model;
                    if (isSTL) { model = new THREE.Mesh(r, m); } else { r.traverse(c => { if (c.isMesh) c.material = m; }); model = r; }
                    modelsGroup.add(model);
                    
                    const d = document.createElement('div'); d.className = 'item-row'; const cs = '#' + new THREE.Color(col).getHexString();
                    d.style.borderLeftColor = cs;
                    const disp = name.replace(/\.(stl|obj)$/i, '');
                    d.innerHTML = `<div class="item-top"><div class="item-left"><input type="checkbox" checked><label>${disp}</label></div>${isU ? '<div class="item-actions"><span class="icon-btn del-btn">🗑️</span></div>' : ""}</div><div class="slider-group"><input type="range" class="opacity-slider" min="0" max="1" step="0.01" value="1"><div class="slider-label">Viditelnost</div></div>`;
                    
                    d.querySelector('input[type="checkbox"]').onchange = (e) => { model.visible = e.target.checked; };
                    d.querySelector('.opacity-slider').oninput = (e) => {
                        const val = parseFloat(e.target.value);
                        if (isSTL) model.material.opacity = val; else model.traverse(c => { if(c.isMesh) c.material.opacity = val; });
                    };
                    if(isU) d.querySelector('.del-btn').onclick = async () => {
                        if(confirm(`Smazat ${disp}?`)) { await supabase.storage.from('models').remove([`shared/${currentSessionId}/${name}`]); modelsGroup.remove(model); d.remove(); }
                    };
                    document.getElementById('model-list').appendChild(d); res();
                });
            });
        }

        // --- VIEWCUBE A RENDER LOOP ---
        const cubeCont = document.getElementById('viewcube-container');
        const cubeScene = new THREE.Scene();
        const cubeCam = new THREE.PerspectiveCamera(45, 1, 0.1, 500); cubeCam.position.set(0, 0, 200);
        const cubeRen = new THREE.WebGLRenderer({ antialias: true, alpha: true }); cubeRen.setSize(cubeSize, cubeSize);
        cubeCont.appendChild(cubeRen.domElement);

        function createLbl(txt, col) {
            const canv = document.createElement('canvas'); canv.width = 128; canv.height = 128;
            const ctx = canv.getContext('2d'); ctx.fillStyle = '#333'; ctx.fillRect(0, 0, 128, 128);
            ctx.strokeStyle = '#666'; ctx.lineWidth = 6; ctx.strokeRect(0, 0, 128, 128);
            ctx.fillStyle = col; ctx.font = 'bold 20px Segoe UI'; ctx.textAlign = 'center'; ctx.fillText(txt, 64, 75);
            return new THREE.CanvasTexture(canv);
        }

        const orientCube = new THREE.Mesh(new THREE.BoxGeometry(85, 85, 85), [
            new THREE.MeshBasicMaterial({ map: createLbl('LAT', '#ff4444') }), new THREE.MeshBasicMaterial({ map: createLbl('MED', '#ff4444') }),
            new THREE.MeshBasicMaterial({ map: createLbl('SUP', '#44ff44') }), new THREE.MeshBasicMaterial({ map: createLbl('INF', '#ffff00') }), 
            new THREE.MeshBasicMaterial({ map: createLbl('ANT', '#4444ff') }), new THREE.MeshBasicMaterial({ map: createLbl('POST', '#4444ff') })
        ]);
        cubeScene.add(orientCube);

        cubeCont.addEventListener('click', (e) => {
            const r = cubeRen.domElement.getBoundingClientRect();
            const m = new THREE.Vector2(((e.clientX - r.left) / cubeSize) * 2 - 1, -((e.clientY - r.top) / cubeSize) * 2 + 1);
            const rc = new THREE.Raycaster(); rc.setFromCamera(m, cubeCam);
            const hits = rc.intersectObject(orientCube);
            if (hits.length > 0) {
                const b = new THREE.Box3().setFromObject(modelsGroup); const c = b.getCenter(new THREE.Vector3());
                const d = Math.max(b.getSize(new THREE.Vector3()).x, b.getSize(new THREE.Vector3()).y, b.getSize(new THREE.Vector3()).z) * 1.5 || 250;
                const idx = Math.floor(hits[0].faceIndex / 2);
                const p = [new THREE.Vector3(c.x+d, c.y, c.z), new THREE.Vector3(c.x-d, c.y, c.z), new THREE.Vector3(c.x, c.y+d, c.z), new THREE.Vector3(c.x, c.y-d, c.z), new THREE.Vector3(c.x, c.y, c.z+d), new THREE.Vector3(c.x, c.y, c.z-d)];
                camera.position.copy(p[idx]); controls.target.copy(c); controls.update();
            }
        });

        // Upload
        document.getElementById('file-input').onchange = async (e) => {
            if(!currentSessionId) currentSessionId = Math.random().toString(36).substring(2, 10);
            document.getElementById('loader-overlay').style.display = 'flex';
            for (const f of e.target.files) {
                if (f.name.endsWith('.zip')) {
                    const z = await JSZip.loadAsync(f);
                    for (const [p, en] of Object.entries(z.files)) { if (!en.dir && (p.endsWith('.stl') || p.endsWith('.obj'))) await supabase.storage.from('models').upload(`shared/${currentSessionId}/${p.split('/').pop()}`, await en.async("blob")); }
                } else await supabase.storage.from('models').upload(`shared/${currentSessionId}/${f.name}`, f);
            }
            window.history.replaceState({}, '', `${window.location.pathname}?id=${currentSessionId}`);
            await fetchModels(currentSessionId);
        };

        document.getElementById('delete-all-btn').onclick = async () => {
            if(confirm("Smazat vše?")) {
                const { data } = await supabase.storage.from('models').list(`shared/${currentSessionId}`);
                if(data) await supabase.storage.from('models').remove(data.map(f => `shared/${currentSessionId}/${f.name}`));
                location.reload();
            }
        };

        document.getElementById('reset-btn').onclick = () => window.location.href = window.location.pathname;

        function updateLabels() {
            annotations.forEach(a => {
                if (a.type === 'measure' && a.visible && a.htmlElement) {
                    // Střed čáry
                    const mid = new THREE.Vector3().addVectors(a.data.p1, a.data.p2).multiplyScalar(0.5);
                    const v = mid.clone().project(camera);
                    const x = (v.x * .5 + .5) * window.innerWidth;
                    const y = (v.y * -.5 + .5) * window.innerHeight;
                    
                    // Skrytí štítku, pokud je bod za kamerou
                    if (v.z > 1) { a.htmlElement.style.display = 'none'; } 
                    else {
                        a.htmlElement.style.display = 'block';
                        a.htmlElement.style.left = `${x}px`;
                        a.htmlElement.style.top = `${y}px`;
                    }
                }
            });
        }

        function anim() {
            requestAnimationFrame(anim); controls.update();
            orientCube.quaternion.copy(camera.quaternion).invert();
            updateLabels();
            renderer.render(scene, camera); cubeRen.render(cubeScene, cubeCam);
        }
        
        if(currentSessionId && window.location.search.includes('id=')) fetchModels();
        anim();
        window.onresize = () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); };
    </script>
</body>
</html>
