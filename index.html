<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Cloud Prohlížeč</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #2b2b2b; color: white; }
        #ui-container { position: absolute; top: 20px; left: 20px; background: rgba(30, 30, 30, 0.9); border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); min-width: 280px; max-width: 350px; z-index: 10; }
        .header-bar { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: rgba(10, 10, 10, 0.6); border-radius: 10px; cursor: pointer; user-select: none; }
        .header-bar h2 { margin: 0; font-size: 1.2em; pointer-events: none; }
        .header-bar:hover { background: rgba(0, 0, 0, 0.8); }
        #ui-content { padding: 0 20px 20px 20px; max-height: 75vh; overflow-y: auto; display: block; }
        #ui-content.collapsed { display: none; } 
        .upload-section { margin-top: 15px; margin-bottom: 20px; border-bottom: 1px solid #555; padding-bottom: 20px; }
        .upload-btn { background: #007bff; color: white; padding: 10px; border-radius: 5px; cursor: pointer; text-align: center; display: block; font-weight: 600; transition: background 0.2s;}
        .upload-btn:hover { background: #0056b3; }
        input[type="file"] { display: none; }
        .reset-btn { background: #dc3545; color: white; padding: 8px; border-radius: 5px; cursor: pointer; text-align: center; display: block; font-weight: 600; width: 100%; border: none; margin-top: 10px; transition: background 0.2s;}
        .reset-btn:hover { background: #c82333; }
        #link-container { display: none; margin-top: 15px; padding: 10px; background: rgba(0, 255, 0, 0.1); border-left: 4px solid #28a745; }
        .generated-link { display: block; margin-top: 5px; color: #28a745; word-break: break-all; font-size: 0.9em; }
        .model-item { margin-top: 12px; display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.05); padding: 8px 12px; border-radius: 5px; }
        .model-item-left { display: flex; align-items: center; }
        .model-item input[type="checkbox"] { margin-right: 12px; cursor: pointer; width: 18px; height: 18px; }
        .model-item label { cursor: pointer; word-break: break-all; font-weight: 500; font-size: 0.9em;}
        .delete-btn { background: none; border: none; color: #ff4d4d; font-size: 1.2em; font-weight: bold; cursor: pointer; padding: 0 0 0 10px; margin: 0; outline: none; transition: color 0.2s; }
        .delete-btn:hover { color: #ff1a1a; }
        #viewer { width: 100vw; height: 100vh; display: block; }
    </style>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <!-- Mapování pro Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <div id="ui-container">
        <div id="toggle-menu-btn" class="header-bar">
            <h2>⚙️ Seznam modelů</h2>
            <span id="toggle-icon" style="transition: transform 0.2s; font-size: 1.2em;">▼</span>
        </div>
        
        <div id="ui-content">
            <div id="upload-box" class="upload-section">
                <label class="upload-btn">
                    Nahrát STL / OBJ / ZIP
                    <input type="file" id="file-input" multiple accept=".stl, .obj, .zip">
                </label>
                <button id="reset-btn" class="reset-btn" style="display: none;">Vyčistit cloud & scénu</button>

                <div id="link-container">
                    <strong>Cloud odkaz vytvořen!</strong>
                    <span style="font-size: 0.8em; color: #aaa;"><br>Tento odkaz můžeš poslat komukoliv.</span>
                    <a id="share-link" class="generated-link" href="#" target="_blank"></a>
                </div>
            </div>

            <div id="model-list">
                <em id="empty-msg" style="color: #aaa; font-size: 0.9em;">Zatím nebyly nahrány žádné modely.</em>
            </div>
        </div>
    </div>

    <div id="viewer"></div>

    <script type="module">
        import * as THREE from 'three';
        import { STLLoader } from 'three/addons/loaders/STLLoader.js';
        import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- PŘIPOJENÍ K TVÉMU FIREBASE CLOUDU ---
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL, deleteObject } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDguKneObW3GP-C1b2fuVKovcFj3G4U-_I",
            authDomain: "dprohlizec.firebaseapp.com",
            projectId: "dprohlizec",
            storageBucket: "dprohlizec.firebasestorage.app",
            messagingSenderId: "723754283412",
            appId: "1:723754283412:web:9856e6cc335aca38935f81"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        // --- ZÁKLADNÍ NASTAVENÍ SCÉNY ---
        const viewer = document.getElementById('viewer');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a1a);
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 10000);
        camera.position.set(100, 100, 100);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        viewer.appendChild(renderer.domElement);
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
        dirLight.position.set(1, 1, 1).normalize();
        scene.add(dirLight);

        const modelsGroup = new THREE.Group();
        modelsGroup.rotation.x = -Math.PI / 2;
        scene.add(modelsGroup);

        function focusCameraOnModels() {
            if (modelsGroup.children.length === 0) return;
            const box = new THREE.Box3().setFromObject(modelsGroup);
            const center = box.getCenter(new THREE.Vector3());
            const size = box.getSize(new THREE.Vector3());
            const maxDim = Math.max(size.x, size.y, size.z);
            const cameraDistance = maxDim * 1.5;
            camera.position.set(center.x, center.y + maxDim / 2, center.z + cameraDistance);
            controls.target.copy(center);
            camera.updateProjectionMatrix();
            controls.update();
        }

        // --- ROLETKA ---
        const toggleMenuBtn = document.getElementById('toggle-menu-btn');
        const uiContent = document.getElementById('ui-content');
        const toggleIcon = document.getElementById('toggle-icon');
        toggleMenuBtn.addEventListener('click', () => {
            uiContent.classList.toggle('collapsed');
            toggleIcon.style.transform = uiContent.classList.contains('collapsed') ? 'rotate(-90deg)' : 'rotate(0deg)';
        });

        // --- LOGIKA APLIKACE A CLOUDU ---
        const fileInput = document.getElementById('file-input');
        const uploadBox = document.getElementById('upload-box'); 
        const linkContainer = document.getElementById('link-container');
        const shareLink = document.getElementById('share-link');
        const emptyMsg = document.getElementById('empty-msg');
        const resetBtn = document.getElementById('reset-btn');
        
        const stlLoader = new STLLoader();
        const objLoader = new OBJLoader();

        let currentModelsData = []; 
        let activeDbId = new URLSearchParams(window.location.search).get('id'); 
        let isVisitorMode = !!activeDbId; 

        // Funkce pro načtení a vykreslení modelu přímo z internetové URL adresy
        function renderModelFromUrl(modelObj, hideDelete) {
            if (emptyMsg) emptyMsg.style.display = 'none';
            const material = new THREE.MeshStandardMaterial({ color: modelObj.color, roughness: 0.4, metalness: 0.1, side: THREE.DoubleSide });
            
            if (modelObj.type === 'obj') {
                objLoader.load(modelObj.url, (object3D) => {
                    object3D.traverse((child) => { if (child.isMesh) child.material = material; });
                    modelsGroup.add(object3D);
                    createVisibilityToggle(modelObj, object3D, hideDelete);
                    focusCameraOnModels();
                });
            } else {
                stlLoader.load(modelObj.url, (geometry) => {
                    const object3D = new THREE.Mesh(geometry, material);
                    modelsGroup.add(object3D);
                    createVisibilityToggle(modelObj, object3D, hideDelete);
                    focusCameraOnModels();
                });
            }
        }

        // Pokud je v adrese ID (Návštěvník), stáhneme data z Firebase
        if (isVisitorMode) {
            uploadBox.style.display = 'none';
            emptyMsg.textContent = "Stahuji modely z cloudu...";

            getDoc(doc(db, "sharedModels", activeDbId)).then(docSnap => {
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    currentModelsData = data.models; 
                    currentModelsData.forEach(model => renderModelFromUrl(model, true));
                } else {
                    emptyMsg.textContent = "Chyba: Odkaz neplatí nebo byly soubory smazány.";
                    emptyMsg.style.color = "#ff4d4d";
                }
            }).catch(error => {
                emptyMsg.textContent = "Chyba připojení k databázi.";
                console.error(error);
            });
        }

        // Tlačítko nahrát - posílá soubory do Firebase
        fileInput.addEventListener('change', async (event) => {
            const files = event.target.files;
            if (files.length === 0) return;

            if (isVisitorMode) isVisitorMode = false;
            if (!activeDbId) activeDbId = Math.random().toString(36).substring(2, 10);

            emptyMsg.style.display = 'block';
            emptyMsg.textContent = "Nahrávám do cloudu... (Záleží na rychlosti internetu)";
            emptyMsg.style.color = "#007bff";

            try {
                const filesToUpload = [];

                for (let i = 0; i < files.length; i++) {
                    const file = files[i];
                    const fileName = file.name.toLowerCase();

                    if (fileName.endsWith('.zip')) {
                        const zip = new JSZip();
                        const loadedZip = await zip.loadAsync(file);
                        for (const [relativePath, zipEntry] of Object.entries(loadedZip.files)) {
                            const isStl = relativePath.toLowerCase().endsWith('.stl');
                            const isObj = relativePath.toLowerCase().endsWith('.obj');
                            if (!zipEntry.dir && (isStl || isObj) && !relativePath.includes('__MACOSX')) {
                                const buffer = await zipEntry.async("arraybuffer");
                                const nameOnly = relativePath.split('/').pop();
                                const blob = new Blob([buffer], { type: 'application/octet-stream' });
                                filesToUpload.push({ name: nameOnly, blob: blob, type: isObj ? 'obj' : 'stl' });
                            }
                        }
                    } else if (fileName.endsWith('.stl') || fileName.endsWith('.obj')) {
                        const buffer = await file.arrayBuffer();
                        const blob = new Blob([buffer], { type: 'application/octet-stream' });
                        filesToUpload.push({ name: file.name, blob: blob, type: fileName.endsWith('.obj') ? 'obj' : 'stl' });
                    }
                }

                if (filesToUpload.length === 0) {
                    emptyMsg.textContent = "Nenalezeny žádné podporované soubory.";
                    return;
                }

                for (const fileData of filesToUpload) {
                    const uniqueFileName = Date.now().toString(36) + '-' + fileData.name;
                    const storageReference = ref(storage, `models/${activeDbId}/${uniqueFileName}`);
                    
                    await uploadBytes(storageReference, fileData.blob);
                    const downloadUrl = await getDownloadURL(storageReference);
                    
                    const colorHex = Math.random() * 0xffffff;
                    const modelObj = { id: uniqueFileName, name: fileData.name, url: downloadUrl, type: fileData.type, color: colorHex };
                    
                    currentModelsData.push(modelObj);
                    renderModelFromUrl(modelObj, false); 
                }

                await setDoc(doc(db, "sharedModels", activeDbId), {
                    models: currentModelsData,
                    createdAt: new Date().toISOString()
                });

                const currentUrl = window.location.href.split('?')[0]; 
                const fullLink = `${currentUrl}?id=${activeDbId}`;
                
                linkContainer.style.display = 'block';
                shareLink.href = fullLink;
                shareLink.textContent = fullLink;

                window.history.pushState(null, '', fullLink);
                resetBtn.style.display = 'block'; 

            } catch (error) {
                console.error(error);
                emptyMsg.textContent = "Chyba při nahrávání do cloudu.";
                emptyMsg.style.color = "#ff4d4d";
            }
            fileInput.value = ""; 
        });

        // Tlačítko smazat vše - vymaže databázi a restartuje
        resetBtn.addEventListener('click', async () => {
            if (activeDbId) {
                await deleteDoc(doc(db, "sharedModels", activeDbId));
            }
            window.location.href = window.location.href.split('?')[0];
        });

        // --- TVORBA PŘEPÍNAČŮ A MAZÁNÍ JEDNOTLIVÝCH KUSŮ ---
        function createVisibilityToggle(modelObj, object3D, hideDelete) {
            const div = document.createElement('div');
            div.className = 'model-item';

            const leftDiv = document.createElement('div');
            leftDiv.className = 'model-item-left';

            const checkbox = document.createElement('input');
            checkbox.type = 'checkbox';
            checkbox.checked = true;
            checkbox.id = 'chk-' + modelObj.id;
            checkbox.addEventListener('change', (e) => object3D.visible = e.target.checked);

            const label = document.createElement('label');
            label.htmlFor = checkbox.id;
            label.textContent = modelObj.name;
            label.style.color = '#' + Math.floor(modelObj.color).toString(16).padStart(6, '0');
            label.style.textShadow = "1px 1px 2px rgba(0,0,0,0.8)";

            leftDiv.appendChild(checkbox);
            leftDiv.appendChild(label);
            div.appendChild(leftDiv);

            if (!hideDelete) {
                const deleteBtn = document.createElement('button');
                deleteBtn.innerHTML = '&times;';
                deleteBtn.className = 'delete-btn';
                deleteBtn.title = "Smazat tento model";
                
                deleteBtn.addEventListener('click', async () => {
                    modelsGroup.remove(object3D);
                    object3D.traverse((child) => {
                        if (child.isMesh) {
                            if (child.geometry) child.geometry.dispose();
                            if (child.material) child.material.dispose();
                        }
                    });
                    div.remove();

                    try {
                        const fileRef = ref(storage, `models/${activeDbId}/${modelObj.id}`);
                        await deleteObject(fileRef);
                    } catch(e) { console.warn("Nelze smazat ze Storage", e); }

                    currentModelsData = currentModelsData.filter(m => m.id !== modelObj.id);
                    if (activeDbId) {
                        await setDoc(doc(db, "sharedModels", activeDbId), { models: currentModelsData });
                    }

                    if (currentModelsData.length === 0 && emptyMsg) {
                        emptyMsg.style.display = 'block';
                        emptyMsg.textContent = "Všechny modely byly smazány.";
                        linkContainer.style.display = 'none'; 
                        resetBtn.style.display = 'none'; 
                    } else {
                        focusCameraOnModels();
                    }
                });

                div.appendChild(deleteBtn);
            }

            document.getElementById('model-list').appendChild(div);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
