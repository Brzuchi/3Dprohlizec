<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D prohlížeč 💾</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1a1a1a; color: white; }
        #ui-container { position: absolute; top: 20px; left: 20px; background: rgba(30, 30, 30, 0.9); border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); min-width: 280px; max-width: 350px; z-index: 10; border: 1px solid #444; }
        .header-bar { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: rgba(10, 10, 10, 0.6); border-radius: 10px 10px 0 0; cursor: pointer; user-select: none; }
        .header-bar h2 { margin: 0; font-size: 1.2em; pointer-events: none; }
        #ui-content { padding: 0 20px 20px 20px; max-height: 75vh; overflow-y: auto; display: block; }
        #ui-content.collapsed { display: none; } 
        .upload-section { margin-top: 15px; margin-bottom: 20px; border-bottom: 1px solid #555; padding-bottom: 20px; }
        .upload-btn { background: #007bff; color: white; padding: 10px; border-radius: 5px; cursor: pointer; text-align: center; display: block; font-weight: 600; transition: background 0.2s;}
        .upload-btn:hover { background: #0056b3; }
        input[type="file"] { display: none; }
        .btn-group { display: flex; gap: 10px; margin-top: 10px; }
        .reset-btn { background: #6c757d; color: white; padding: 8px; border-radius: 5px; cursor: pointer; text-align: center; flex: 1; font-weight: 600; border: none; }
        .delete-all-btn { background: #dc3545; color: white; padding: 8px; border-radius: 5px; cursor: pointer; text-align: center; flex: 1; font-weight: 600; border: none; }
        #link-container { display: none; margin-top: 15px; padding: 12px; background: rgba(0, 123, 255, 0.1); border: 1px solid #007bff; border-radius: 5px; }
        .link-row { display: flex; gap: 8px; margin-top: 8px; align-items: center; }
        .generated-link { flex: 1; color: #00a2ff; word-break: break-all; font-size: 0.85em; text-decoration: none; font-family: monospace; background: rgba(0,0,0,0.3); padding: 8px; border-radius: 3px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .copy-btn { background: #007bff; color: white; border: none; padding: 8px 12px; border-radius: 3px; cursor: pointer; font-size: 0.8em; font-weight: bold; transition: background 0.2s; white-space: nowrap; }
        
        /* Layout položky v seznamu */
        .model-item { margin-top: 12px; display: flex; flex-direction: column; background: rgba(255,255,255,0.05); padding: 10px 12px; border-radius: 5px; border-left: 4px solid transparent; }
        .model-item-top { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        .model-item-left { display: flex; align-items: center; overflow: hidden; }
        .model-item input[type="checkbox"] { margin-right: 12px; cursor: pointer; width: 18px; height: 18px; flex-shrink: 0; }
        .model-item label { cursor: pointer; font-weight: 600; font-size: 0.9em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 180px; }
        .del-file-btn { color: #dc3545; cursor: pointer; font-weight: bold; font-size: 1.2em; margin-left: 10px; }
        
        /* Styl pro slider průhlednosti */
        .opacity-slider { width: 100%; margin-top: 8px; height: 4px; cursor: pointer; accent-color: #007bff; }

        #viewer { width: 100vw; height: 100vh; display: block; }
        #viewcube-container { position: absolute; top: 20px; right: 20px; width: 130px; height: 130px; z-index: 20; }
        #loader-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 100; flex-direction: column; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script type="importmap"> { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } } </script>
</head>
<body>
    <div id="loader-overlay">
        <div style="border: 4px solid #f3f3f3; border-top: 4px solid #007bff; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite;"></div>
        <p id="loader-text" style="margin-top: 15px;">Pracuji na tom...</p>
    </div>

    <div id="ui-container">
        <div id="toggle-menu-btn" class="header-bar">
            <h2>⚙️ 3D prohlížeč 💾</h2>
            <span id="toggle-icon" style="transition: transform 0.2s;">▼</span>
        </div>
        <div id="ui-content">
            <div id="upload-box" class="upload-section">
                <label class="upload-btn">Nahrát STL / OBJ / ZIP
                    <input type="file" id="file-input" multiple accept=".stl, .obj, .zip">
                </label>
                <div id="link-container">
                    <strong style="color: #00a2ff;">Odkaz pro sdílení:</strong>
                    <div class="link-row">
                        <a id="share-link" class="generated-link" href="#" target="_blank"></a>
                        <button id="copy-link-btn" class="copy-btn">Kopírovat</button>
                    </div>
                </div>
                <div class="btn-group">
                    <button id="reset-btn" class="reset-btn" style="display: none;">Nová práce</button>
                    <button id="delete-all-btn" class="delete-all-btn" style="display: none;">Smazat vše</button>
                </div>
            </div>
            <div id="model-list"><em id="empty-msg" style="color: #aaa; font-size: 0.9em;">Žádné modely k zobrazení.</em></div>
        </div>
    </div>

    <div id="viewcube-container"></div>
    <div id="viewer"></div>

    <script type="module">
        import * as THREE from 'three';
        import { STLLoader } from 'three/addons/loaders/STLLoader.js';
        import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

        const supabase = createClient('https://aukjrwkjvuhmbfqqgoav.supabase.co', 'sb_publishable_YvrqIr_5PQY-wftqvZDcYA_Mu_HuKT3');
        const cubeSize = 130;
        let currentSessionId = new URLSearchParams(window.location.search).get('id');

        const scene = new THREE.Scene(); scene.background = new THREE.Color(0x1a1a1a);
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 10000); camera.position.set(200, 200, 200);
        const renderer = new THREE.WebGLRenderer({ antialias: true }); renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('viewer').appendChild(renderer.domElement);
        const controls = new OrbitControls(camera, renderer.domElement); controls.enableDamping = true;
        scene.add(new THREE.AmbientLight(0xffffff, 0.7));
        const dl = new THREE.DirectionalLight(0xffffff, 1.2); dl.position.set(100, 100, 100); scene.add(dl);
        const modelsGroup = new THREE.Group(); modelsGroup.rotation.x = -Math.PI/2; scene.add(modelsGroup);

        const cubeCont = document.getElementById('viewcube-container');
        cubeCont.innerHTML = ''; 
        const cubeScene = new THREE.Scene();
        const cubeCam = new THREE.PerspectiveCamera(45, 1, 0.1, 500); cubeCam.position.set(0, 0, 200);
        const cubeRen = new THREE.WebGLRenderer({ antialias: true, alpha: true }); cubeRen.setSize(cubeSize, cubeSize);
        cubeCont.appendChild(cubeRen.domElement);

        function createLbl(txt, col) {
            const canv = document.createElement('canvas'); canv.width = 128; canv.height = 128;
            const ctx = canv.getContext('2d'); ctx.fillStyle = '#333'; ctx.fillRect(0, 0, 128, 128);
            ctx.strokeStyle = '#666'; ctx.lineWidth = 6; ctx.strokeRect(0, 0, 128, 128);
            ctx.fillStyle = col; ctx.font = 'bold 20px Segoe UI'; ctx.textAlign = 'center'; ctx.fillText(txt, 64, 75);
            return new THREE.CanvasTexture(canv);
        }

        const cubeGeo = new THREE.BoxGeometry(85, 85, 85);
        const cubeMats = [
            new THREE.MeshBasicMaterial({ map: createLbl('LATERAL', '#ff4444') }), 
            new THREE.MeshBasicMaterial({ map: createLbl('MEDIAL', '#ff4444') }),
            new THREE.MeshBasicMaterial({ map: createLbl('SUPERIOR', '#44ff44') }),
            new THREE.MeshBasicMaterial({ map: createLbl('INFERIOR', '#ffff00') }), 
            new THREE.MeshBasicMaterial({ map: createLbl('ANTERIOR', '#4444ff') }),
            new THREE.MeshBasicMaterial({ map: createLbl('POSTERIOR', '#4444ff') })
        ];
        const orientCube = new THREE.Mesh(cubeGeo, cubeMats); cubeScene.add(orientCube);

        cubeCont.addEventListener('click', (e) => {
            const r = cubeRen.domElement.getBoundingClientRect();
            const m = new THREE.Vector2(((e.clientX - r.left) / cubeSize) * 2 - 1, -((e.clientY - r.top) / cubeSize) * 2 + 1);
            const rc = new THREE.Raycaster(); rc.setFromCamera(m, cubeCam);
            const hits = rc.intersectObject(orientCube);
            if (hits.length > 0) align(Math.floor(hits[0].faceIndex / 2));
        });

        function align(idx) {
            const b = new THREE.Box3().setFromObject(modelsGroup); const c = b.getCenter(new THREE.Vector3());
            const d = Math.max(b.getSize(new THREE.Vector3()).x, b.getSize(new THREE.Vector3()).y, b.getSize(new THREE.Vector3()).z) * 1.8 || 250;
            const p = [new THREE.Vector3(c.x + d, c.y, c.z), new THREE.Vector3(c.x - d, c.y, c.z), new THREE.Vector3(c.x, c.y + d, c.z), new THREE.Vector3(c.x, c.y - d, c.z), new THREE.Vector3(c.x, c.y, c.z + d), new THREE.Vector3(c.x, c.y, c.z - d)];
            camera.position.copy(p[idx]); controls.target.copy(c); controls.update();
        }

        document.getElementById('copy-link-btn').onclick = () => {
            navigator.clipboard.writeText(document.getElementById('share-link').innerText).then(() => {
                const b = document.getElementById('copy-link-btn'); b.innerText = "Hotovo!"; b.style.background = "#28a745";
                setTimeout(() => { b.innerText = "Kopírovat"; b.style.background = "#007bff"; }, 2000);
            });
        };

        document.getElementById('toggle-menu-btn').onclick = () => {
            document.getElementById('ui-content').classList.toggle('collapsed');
            document.getElementById('toggle-icon').style.transform = document.getElementById('ui-content').classList.contains('collapsed') ? 'rotate(-90deg)' : 'rotate(0deg)';
        };

        async function fetchModels(targetId) {
            const id = targetId || currentSessionId; if (!id) return;
            if (!targetId) document.getElementById('upload-box').style.display = 'none';
            else { document.getElementById('reset-btn').style.display = 'block'; document.getElementById('delete-all-btn').style.display = 'block'; }
            document.getElementById('loader-overlay').style.display = 'flex';
            const { data } = await supabase.storage.from('models').list(`shared/${id}`);
            const cols = [0x007bff, 0xdc3545, 0x28a745, 0xffc107, 0x17a2b8, 0x6f42c1, 0xfd7e14, 0xe83e8c, 0x20c997, 0x6610f2, 0xadb5bd, 0x94d82d, 0xff922b, 0x51cf66, 0x339af0, 0xcc5de8];
            let ci = 0; document.getElementById('model-list').innerHTML = ""; modelsGroup.clear();
            for (const f of (data || [])) {
                if(f.name.startsWith('.')) continue;
                const { data: pu } = supabase.storage.from('models').getPublicUrl(`shared/${id}/${f.name}`);
                await renderModel(pu.publicUrl, f.name, cols[ci++ % cols.length], !!targetId);
            }
            const b = new THREE.Box3().setFromObject(modelsGroup); controls.target.copy(b.getCenter(new THREE.Vector3())); controls.update();
            document.getElementById('loader-overlay').style.display = 'none';
        }

        async function renderModel(url, name, col, isU) {
            const l = name.toLowerCase().endsWith('.obj') ? new OBJLoader() : new STLLoader();
            return new Promise(res => {
                l.load(url, (r) => {
                    const m = new THREE.MeshStandardMaterial({ 
                        color: col, 
                        roughness: 0.5, 
                        metalness: 0.2, 
                        side: THREE.DoubleSide,
                        transparent: true, // Povolení průhlednosti
                        opacity: 1 
                    });
                    let mesh = r.isMesh ? r : r.children[0];
                    if(!r.isMesh) r.traverse(c => { if(c.isMesh) c.material = m; }); else mesh.material = m;
                    modelsGroup.add(r.isMesh ? mesh : r);
                    
                    if(document.getElementById('empty-msg')) document.getElementById('empty-msg').style.display = 'none';
                    const d = document.createElement('div'); d.className = 'model-item'; const cs = '#' + new THREE.Color(col).getHexString();
                    d.style.borderLeftColor = cs;
                    
                    d.innerHTML = `
                        <div class="model-item-top">
                            <div class="model-item-left">
                                <input type="checkbox" checked>
                                <label style="color:${cs}">${name}</label>
                            </div>
                            ${isU ? '<span class="del-file-btn">×</span>' : ""}
                        </div>
                        <input type="range" class="opacity-slider" min="0" max="1" step="0.01" value="1" title="Průhlednost">
                    `;
                    
                    // Eventy pro viditelnost a průhlednost
                    d.querySelector('input[type="checkbox"]').onchange = (e) => { (r.isMesh ? mesh : r).visible = e.target.checked; };
                    d.querySelector('.opacity-slider').oninput = (e) => {
                        const val = parseFloat(e.target.value);
                        if(r.isMesh) r.material.opacity = val;
                        else r.traverse(c => { if(c.isMesh) c.material.opacity = val; });
                    };

                    if(isU) d.querySelector('.del-file-btn').onclick = async () => {
                        if(confirm(`Smazat ${name}?`)) { await supabase.storage.from('models').remove([`shared/${currentSessionId}/${name}`]); modelsGroup.remove(r.isMesh ? mesh : r); d.remove(); }
                    };
                    document.getElementById('model-list').appendChild(d); res();
                });
            });
        }

        document.getElementById('file-input').onchange = async (e) => {
            if(!currentSessionId) currentSessionId = Math.random().toString(36).substring(2, 10);
            document.getElementById('loader-overlay').style.display = 'flex';
            for (const f of e.target.files) {
                if (f.name.endsWith('.zip')) {
                    const z = await JSZip.loadAsync(f);
                    for (const [p, en] of Object.entries(z.files)) {
                        if (!en.dir && (p.endsWith('.stl') || p.endsWith('.obj'))) await supabase.storage.from('models').upload(`shared/${currentSessionId}/${p.split('/').pop()}`, await en.async("blob"));
                    }
                } else await supabase.storage.from('models').upload(`shared/${currentSessionId}/${f.name}`, f);
            }
            const u = `${window.location.origin}${window.location.pathname}?id=${currentSessionId}`;
            document.getElementById('share-link').href = u; document.getElementById('share-link').innerText = u; document.getElementById('link-container').style.display = 'block';
            await fetchModels(currentSessionId);
        };

        document.getElementById('delete-all-btn').onclick = async () => {
            if(confirm("Smazat vše?")) {
                const { data } = await supabase.storage.from('models').list(`shared/${currentSessionId}`);
                if(data) await supabase.storage.from('models').remove(data.map(f => `shared/${currentSessionId}/${f.name}`));
                location.reload();
            }
        };

        document.getElementById('reset-btn').onclick = () => window.location.href = window.location.pathname;

        function anim() {
            requestAnimationFrame(anim); controls.update();
            orientCube.quaternion.copy(camera.quaternion).invert();
            renderer.render(scene, camera); cubeRen.render(cubeScene, cubeCam);
        }
        
        if(currentSessionId && window.location.search.includes('id=')) fetchModels();
        anim();
        window.onresize = () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); };
    </script>
</body>
</html>
